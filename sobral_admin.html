<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobral Cultural — Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ochre:#C8871A;--gold:#D4A843;--terra:#B54A2A;--deep:#1A1410;--mid:#251B12;--panel:#2E2118;--card:#382A1C;--cream:#F5EDD8;--muted:rgba(245,237,216,0.45);--border:rgba(200,135,26,0.2);--radius:12px;--teal:#1B6B6B;--green:#3C7828;--purple:#6440B4;--sidebar:260px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--cream)}a{color:inherit;text-decoration:none}
.app{display:flex;height:100vh;overflow:hidden}.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--mid);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}.main{flex:1;overflow-y:auto;background:var(--deep)}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}.sb-logo-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}.sb-logo-icon{width:38px;height:38px;background:var(--ochre);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}.sb-logo h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:800;line-height:1.1}.sb-logo span{font-size:10px;color:var(--ochre);letter-spacing:2px;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}.nav-section{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:12px 10px 6px}.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:400;border:none;background:transparent;color:var(--cream);width:100%;text-align:left}.nav-btn:hover{background:rgba(200,135,26,.1);color:var(--gold)}.nav-btn.active{background:rgba(200,135,26,.15);color:var(--ochre);font-weight:500}.nav-btn .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}.nav-btn .badge{margin-left:auto;background:var(--ochre);color:var(--deep);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sb-footer{padding:16px;border-top:1px solid var(--border)}.sb-footer a{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);padding:8px 10px;border-radius:8px;transition:.15s}.sb-footer a:hover{background:rgba(255,255,255,.06);color:var(--cream)}
.page-header{padding:28px 36px 0;display:flex;align-items:flex-start;justify-content:space-between}.page-title h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;margin-bottom:4px}.page-title p{font-size:13px;color:var(--muted)}.page-actions{display:flex;gap:10px;flex-shrink:0;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}.btn-primary{background:var(--ochre);color:var(--deep)}.btn-primary:hover{background:var(--gold);transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,135,26,.4)}.btn-secondary{background:rgba(255,255,255,.07);color:var(--cream);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,.12)}.btn-danger{background:rgba(181,74,42,.15);color:#e89e7e;border:1px solid rgba(181,74,42,.3)}.btn-danger:hover{background:rgba(181,74,42,.25)}.btn-ghost{background:transparent;color:var(--muted);padding:8px 12px}.btn-ghost:hover{color:var(--cream);background:rgba(255,255,255,.06)}.btn-sm{padding:7px 13px;font-size:12px;border-radius:7px}
.page-content{padding:24px 36px 40px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ochre)}.stat-card[data-c="green"]::before{background:var(--green)}.stat-card[data-c="terra"]::before{background:var(--terra)}.stat-card[data-c="teal"]::before{background:var(--teal)}.stat-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:var(--cream);line-height:1}.stat-label{font-size:12px;color:var(--muted);margin-top:6px}.stat-icon{position:absolute;right:16px;top:16px;font-size:24px;opacity:.35}
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}.spot-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;display:flex;flex-direction:column}.spot-item:hover{border-color:rgba(200,135,26,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}.spot-photo{height:140px;position:relative;overflow:hidden;background:var(--card)}.spot-photo img{width:100%;height:100%;object-fit:cover}.spot-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.4}.spot-photo-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:3px 10px;border-radius:20px;font-size:11px;color:var(--cream)}.spot-body{padding:14px;flex:1;display:flex;flex-direction:column}.spot-name{font-weight:600;font-size:14.5px;margin-bottom:4px;color:var(--cream)}.spot-meta{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}.spot-actions{display:flex;gap:7px;margin-top:auto}
.form-section{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}.form-section-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}.form-section-header h3{font-size:14px;font-weight:600;flex:1}.form-section-icon{font-size:18px}.form-section-toggle{font-size:18px;color:var(--muted);transition:.2s}.form-section-body{padding:20px}.form-section.collapsed .form-section-body{display:none}.form-section.collapsed .form-section-toggle{transform:rotate(-90deg)}
.form-row{display:grid;gap:14px;margin-bottom:14px}.form-row.cols-2{grid-template-columns:1fr 1fr}.form-group{display:flex;flex-direction:column;gap:6px}label{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.3px}label em{color:var(--terra);font-style:normal}input,select,textarea{background:rgba(255,255,255,.06);border:1.5px solid rgba(200,135,26,.2);border-radius:8px;padding:11px 14px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:.15s;width:100%}input:focus,select:focus,textarea:focus{border-color:var(--ochre);background:rgba(200,135,26,.07)}input::placeholder,textarea::placeholder{color:rgba(245,237,216,.25)}select option{background:var(--panel);color:var(--cream)}textarea{resize:vertical;min-height:90px;line-height:1.55}.helper{font-size:11.5px;color:var(--muted);margin-top:2px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.emoji-opt{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,.06);transition:.15s}.emoji-opt:hover,.emoji-opt.selected{border-color:var(--ochre);background:rgba(200,135,26,.15)}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}.color-opt.selected{border-color:white;box-shadow:0 0 0 2px var(--ochre)}
.drop-zone{border:2px dashed rgba(200,135,26,.3);border-radius:var(--radius);padding:36px;text-align:center;cursor:pointer;transition:.2s;position:relative;background:rgba(200,135,26,.03)}.drop-zone:hover,.drop-zone.drag-over{border-color:var(--ochre);background:rgba(200,135,26,.08)}.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}.drop-zone-icon{font-size:36px;margin-bottom:10px;opacity:.6}.drop-zone p{font-size:13.5px;color:var(--muted);margin-bottom:4px}.drop-zone small{font-size:12px;color:rgba(245,237,216,.3)}.photo-preview{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--card)}.photo-preview img{width:100%;max-height:280px;object-fit:cover;display:block}.photo-preview-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px}.photo-size-info{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
#coordMap{height:280px;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border)}.coord-display{display:flex;gap:10px;margin-top:10px}.coord-display input{font-size:13px;background:rgba(0,0,0,.3)}.coord-hint{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.editor-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);border-radius:var(--radius) var(--radius) 0 0}.editor-toolbar button{background:rgba(255,255,255,.07);border:1px solid transparent;color:var(--cream);width:32px;height:30px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:'DM Sans',sans-serif}.editor-toolbar button:hover{background:rgba(200,135,26,.2);border-color:rgba(200,135,26,.3)}.editor-toolbar .sep{width:1px;background:var(--border);margin:2px 4px;align-self:stretch}.blog-editor{min-height:300px;padding:16px;outline:none;font-size:14px;line-height:1.7;color:var(--cream);border:1.5px solid rgba(200,135,26,.2);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:rgba(255,255,255,.04);overflow-y:auto}.blog-editor:focus{border-color:var(--ochre)}.blog-editor h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin:16px 0 8px}.blog-editor h3{font-size:16px;color:var(--ochre);margin:12px 0 6px;font-weight:600}.blog-editor p{margin-bottom:10px}.blog-editor ul,.blog-editor ol{margin:10px 0 10px 24px}.blog-editor li{margin-bottom:4px}.blog-editor blockquote{border-left:3px solid var(--ochre);padding:10px 16px;background:rgba(200,135,26,.08);border-radius:0 8px 8px 0;margin:12px 0;font-style:italic;color:var(--muted)}.blog-editor a{color:var(--ochre);text-decoration:underline}.blog-editor strong{color:var(--cream);font-weight:600}
.backup-area{display:grid;grid-template-columns:1fr 1fr;gap:16px}.backup-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center}.backup-card h3{font-size:15px;font-weight:600;margin-bottom:8px}.backup-card p{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}.backup-card .icon{font-size:32px;margin-bottom:12px}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}.toast{padding:12px 18px;border-radius:10px;font-size:13.5px;display:flex;align-items:center;gap:10px;min-width:240px;max-width:340px;background:var(--panel);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.5);animation:toast-in .3s cubic-bezier(.34,1.2,.64,1) both}.toast.success{border-color:rgba(60,120,40,.5);background:rgba(60,120,40,.15)}.toast.error{border-color:rgba(181,74,42,.5);background:rgba(181,74,42,.15)}.toast.info{border-color:rgba(200,135,26,.4)}@keyframes toast-in{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:.2s;pointer-events:none}.modal-overlay.open{opacity:1;pointer-events:all}.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:420px;width:100%;transform:scale(.95);transition:.2s;box-shadow:0 20px 60px rgba(0,0,0,.6)}.modal-overlay.open .modal{transform:scale(1)}.modal h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:10px}.modal p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:22px}.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .es-icon{font-size:48px;margin-bottom:16px;opacity:.5}.empty-state h3{font-size:16px;font-weight:600;color:var(--cream);margin-bottom:8px}.empty-state p{font-size:13px;max-width:300px;margin:0 auto 20px;line-height:1.6}
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px}.search-bar input{flex:1;background:var(--panel);border:1.5px solid var(--border)}.filter-select{background:var(--panel);border:1.5px solid var(--border);color:var(--cream);padding:10px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;outline:none}
.section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:4px;color:var(--cream)}.section-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}
/* ── RESPONSIVE ADMIN ── */
.adm-topbar{display:none}
.adm-hbg{display:none;flex-direction:column;gap:5px;width:38px;height:38px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:9px;cursor:pointer;padding:8px;justify-content:center}
.adm-hbg span{display:block;height:2px;background:var(--cream);border-radius:2px;transition:all .3s}
.adm-hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.adm-hbg.open span:nth-child(2){opacity:0}
.adm-hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-sb-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800}
@media(max-width:900px){
  .app{position:relative}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:900;transform:translateX(-100%);transition:transform .3s}
  .sidebar.mob-open{transform:translateX(0)}
  .mob-sb-back{display:block}
  .adm-hbg{display:flex}
  .adm-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;background:var(--mid);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:700;width:100%}
  .adm-topbar h2{font-family:'Playfair Display',serif;font-size:15px;color:var(--cream)}
  .page-header{padding:20px 18px 0;flex-wrap:wrap;gap:10px}
  .page-actions{flex-wrap:wrap}
  .page-content{padding:18px 18px 40px}
  .page-title h2{font-size:20px}
  .form-row.cols-2{grid-template-columns:1fr}
  .backup-area{grid-template-columns:1fr}
  .spots-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  #coordMap{height:220px}
  .blog-editor{min-height:200px}
}
@media(min-width:901px){.adm-topbar{display:none!important}.sidebar{transform:none!important;position:relative!important}.mob-sb-back{display:none!important}}
/* ── MESSAGES TABLE ── */
.msg-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.msg-table th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px;text-align:left;font-weight:500}
.msg-row{background:var(--panel);border-radius:var(--radius);cursor:pointer;transition:.15s}
.msg-row:hover{background:rgba(200,135,26,.08)}
.msg-row td{padding:12px;font-size:13px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.msg-row td:first-child{border-left:1px solid var(--border);border-radius:var(--radius) 0 0 var(--radius)}
.msg-row td:last-child{border-right:1px solid var(--border);border-radius:0 var(--radius) var(--radius) 0)}
.msg-row.unread td:first-child{border-left:3px solid var(--ochre)}
.msg-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600}
.msg-badge.new{background:rgba(200,135,26,.2);color:var(--ochre)}
.msg-badge.read{background:rgba(255,255,255,.05);color:var(--muted)}
/* ── PAGES MANAGER ── */
.pages-list{display:flex;flex-direction:column;gap:10px}
.page-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
.page-item:hover{border-color:rgba(200,135,26,.4)}
.page-item-icon{font-size:22px;flex-shrink:0}
.page-item-info{flex:1}.page-item-name{font-weight:600;font-size:14px;margin-bottom:3px}.page-item-meta{font-size:12px;color:var(--muted)}
.page-item-actions{display:flex;gap:8px}
/* ── MSG MODAL ── */
.msg-modal-inner{max-width:560px}
.msg-modal-inner .msg-body{font-size:14px;line-height:1.7;color:var(--muted);background:rgba(0,0,0,.2);border-radius:9px;padding:14px;margin:12px 0}
/* ── PAGES EDITOR TOOLBAR ── */
.page-editor-wrap{border:1.5px solid rgba(200,135,26,.2);border-radius:var(--radius);overflow:hidden}
.page-editor-wrap .editor-toolbar{border-radius:0}
.page-editor-wrap .blog-editor{border:none;border-radius:0;min-height:400px}
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:.25s}.login-overlay.active{pointer-events:all;opacity:1}.login-modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:26px;min-width:320px;max-width:380px;box-shadow:0 18px 40px rgba(0,0,0,.8);text-align:center}.login-modal h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:10px}.login-modal p{color:var(--muted);margin-bottom:18px;font-size:13px}.login-modal .form-group{margin-bottom:12px;text-align:left}.login-modal input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,.06);color:var(--cream)}.login-modal .btn{width:100%;justify-content:center}.login-modal .login-error{color:#e89e7e;font-size:12px;height:18px;line-height:18px;margin-bottom:8px}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-modal">
    <h2>🏛️ Área Administrativa</h2>
    <p>Faça login com sua conta de administrador</p>
    <div class="form-group"><label style="font-size:12px;margin-bottom:4px;display:block">E-mail</label><input id="adminUser" type="email" placeholder="admin@email.com" autocomplete="email"></div>
    <div class="form-group"><label style="font-size:12px;margin-bottom:4px;display:block">Senha</label><input id="adminPass" type="password" placeholder="********" autocomplete="current-password" onkeydown="if(event.key==='Enter')performLogin()"></div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="performLogin()">Entrar</button>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">Acesso restrito a administradores autorizados.</div>
  </div>
</div>

<div class="app" id="theApp">
  <!-- MOBILE TOPBAR -->
  <div class="adm-topbar" id="admTopbar">
    <button class="adm-hbg" id="admHbg" onclick="toggleAdmSb()"><span></span><span></span><span></span></button>
    <h2>Sobral Cultural</h2>
    <button class="btn btn-sm btn-primary" onclick="navigate('new')">+ Novo</button>
  </div>
  <div class="mob-sb-back" id="mobSbBack" onclick="closeAdmSb()" style="display:none"></div>
  <aside class="sidebar" id="admSidebar">
    <div class="sb-logo">
      <div class="sb-logo-top">
        <div class="sb-logo-icon">🏛️</div>
        <div><h1>Sobral Cultural</h1><div style="font-size:10px;color:var(--muted)">Painel Administrativo</div></div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nav-section">Navegação</div>
      <button class="nav-btn active" onclick="navigate('dashboard')"><div class="icon">📊</div> Painel Geral</button>
      <button class="nav-btn" onclick="navigate('list')"><div class="icon">📍</div> Pontos Turísticos <span class="badge" id="spotCountBadge">…</span></button>
      <button class="nav-btn" onclick="navigate('new')"><div class="icon">➕</div> Adicionar Novo Ponto</button>
      <div class="nav-section">Comunicação</div>
      <button class="nav-btn" onclick="navigate('messages')"><div class="icon">✉️</div> Mensagens de Contato <span class="badge" id="msgBadge" style="display:none">0</span></button>
      <button class="nav-btn" onclick="navigate('moderation')"><div class="icon">🔍</div> Moderação <span class="badge" id="modBadge" style="display:none">0</span></button>
      <div class="nav-section">Páginas do Site</div>
      <button class="nav-btn" onclick="navigate('pages')"><div class="icon">📄</div> Gerenciar Páginas</button>
      <div class="nav-section">Sistema</div>
      <button class="nav-btn" onclick="navigate('backup')"><div class="icon">💾</div> Backup e Restauração</button>
    </nav>

let _cache = [];

function mapRow(r) {

// ══════════════════════════════════════════
//  SALVAR SPOT
// ══════════════════════════════════════════
async function saveSpotToSupabase(spot) {
  try {
    let photoUrl = spot.photo;
    if (window._pendingPhoto && window._pendingPhoto.startsWith('data:')) {
      showToast('Enviando foto ao Supabase Storage…', 'info');
      photoUrl = await uploadPhoto(spot.id, window._pendingPhoto);
      window._pendingPhoto = undefined;
    }
    const row = {
      id: spot.id, name: spot.name, cat: spot.cat, emoji: spot.emoji,
      color: spot.color, lat: spot.lat, lng: spot.lng,
      description: spot.desc, address: spot.address,
      horario: spot.horario, entrada: spot.entrada, photo: photoUrl,
      blog_title: spot.blogTitle, blog_content: spot.blogContent,
      blog_author: spot.blogAuthor, blog_date: spot.blogDate || new Date().toISOString().split('T')[0],
      created_at: spot.createdAt || new Date().toISOString()
    };
    const { error } = await supa.from('spots').upsert(row, { onConflict: 'id' });
    if (error) throw error;
    await loadSpots();
    return true;
  } catch(e) {
    console.error(e);
    showToast('Erro ao salvar: ' + e.message, 'error');
    return false;
  }
}

// ══════════════════════════════════════════
//  UPLOAD FOTO → STORAGE
// ══════════════════════════════════════════
async function uploadPhoto(spotId, base64DataUrl) {
  const res = await fetch(base64DataUrl);
  const blob = await res.blob();
  const path = `${spotId}/photo.jpg`;
  await supa.storage.from(BUCKET).remove([path]);
  const { error } = await supa.storage.from(BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
  if (error) throw error;
  const { data } = supa.storage.from(BUCKET).getPublicUrl(path);
  return data.publicUrl + '?v=' + Date.now();
}

// ══════════════════════════════════════════
//  DELETAR SPOT
// ══════════════════════════════════════════
async function deleteSpotFromSupabase(id) {
  try {
    await supa.storage.from(BUCKET).remove([`${id}/photo.jpg`]);
    const { error } = await supa.from('spots').delete().eq('id', id);
    if (error) throw error;
    await loadSpots();
    return true;
  } catch(e) {
    console.error(e);
    showToast('Erro ao excluir: ' + e.message, 'error');
    return false;
  }
}

function isAuthenticated() { return !!window._adminUser; }
function showLoginOverlay(show = true) {
  const ov = document.getElementById('loginOverlay'), app = document.querySelector('.app');
  if (show) { ov.classList.add('active'); if (app) { app.style.filter='blur(2px)'; app.style.pointerEvents='none'; } }
  else { ov.classList.remove('active'); if (app) { app.style.filter=''; app.style.pointerEvents=''; } }
}
async function performLogin() {
  const email = document.getElementById('adminUser')?.value.trim();
  const pass  = document.getElementById('adminPass')?.value.trim();
  const err   = document.getElementById('loginError');
  if (!email || !pass) { err.textContent = 'Preencha e-mail e senha.'; return; }

  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = 'Credenciais inválidas.'; return; }

  // check admin role
  const { data: prof } = await supa.from('profiles').select('role').eq('id', data.user.id).single();
  if (!prof || prof.role !== 'admin') {
    await supa.auth.signOut();
    err.textContent = 'Acesso negado: conta sem permissão de administrador.';
    return;
  }
  window._adminUser = data.user;
  err.textContent = '';
  showToast('Login realizado! 🎉', 'success');
  showLoginOverlay(false);
  navigate('dashboard');
}
async function logout() {
  await supa.auth.signOut();
  window._adminUser = null;
  showLoginOverlay(true);
  document.getElementById('adminUser').value = '';
  document.getElementById('adminPass').value = '';
  showToast('Sessão encerrada.', 'info');
}
function requireAuth() {
  if (!isAuthenticated()) { showLoginOverlay(true); return false; }
  showLoginOverlay(false); return true;
}

function renderPhotoPreview(src) { return `<div class="photo-preview"><img src="${src}" alt="Foto"><div class="photo-preview-actions"><button class="btn btn-sm btn-secondary" onclick="removePhoto()">🗑️ Remover</button></div></div><div class="photo-size-info" id="photoInfo">Foto carregada ✓</div>`; }

function initFormExtras(id = null) {
  const s = id ? getSpots().find(x => x.id === id) : null;
  updateCharCount(); setupDropZone();
  setTimeout(() => {
    const el = document.getElementById('coordMap');
    if (!el || coordPickerMap) return;
    const lat = s?.lat || -3.6880, lng = s?.lng || -40.3497;
    coordPickerMap = L.map('coordMap', { center:[lat,lng], zoom:14, zoomControl:true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'© OSM © CARTO', subdomains:'abcd', maxZoom:19 }).addTo(coordPickerMap);
    if (s?.lat) { coordMarker = L.marker([s.lat,s.lng], { draggable:true }).addTo(coordPickerMap); coordMarker.on('dragend', updateCoordsFromMarker); }
    coordPickerMap.on('click', e => {
      const { lat, lng } = e.latlng;
      document.getElementById('f-lat').value = lat.toFixed(6);
      document.getElementById('f-lng').value = lng.toFixed(6);
      if (coordMarker) coordMarker.setLatLng([lat, lng]);
      else { coordMarker = L.marker([lat,lng],{draggable:true}).addTo(coordPickerMap); coordMarker.on('dragend', updateCoordsFromMarker); }
    });
  }, 100);
}
function updateCoordsFromMarker() { const p = coordMarker.getLatLng(); document.getElementById('f-lat').value = p.lat.toFixed(6); document.getElementById('f-lng').value = p.lng.toFixed(6); }
function setupDropZone() { const dz = document.getElementById('dropZone'); if (!dz) return; dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');}); dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over')); dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)handlePhoto(f);}); }
async function handlePhoto(file) {
  if (!file || !file.type.startsWith('image/')) { showToast('Escolha uma imagem válida.', 'error'); return; }
  if (file.size > 5*1024*1024) { showToast('Imagem muito grande. Máximo 5 MB.', 'error'); return; }
  showToast('Comprimindo imagem…', 'info');
  const compressed = await compressImage(file);
  window._pendingPhoto = compressed;
  document.getElementById('photoArea').innerHTML = renderPhotoPreview(compressed);
  document.getElementById('photoInfo').textContent = `Foto processada ✓ (~${Math.round(compressed.length*.75/1024)} KB) — será enviada ao Storage`;
}
async function compressImage(file, maxW=900, quality=0.78) {
  return new Promise(r => { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.onload = () => { const ratio = Math.min(maxW/img.width,1); const c = document.createElement('canvas'); c.width = img.width*ratio; c.height = img.height*ratio; c.getContext('2d').drawImage(img,0,0,c.width,c.height); r(c.toDataURL('image/jpeg',quality)); }; img.src = e.target.result; }; reader.readAsDataURL(file); });
}
function removePhoto() { window._pendingPhoto = null; document.getElementById('photoArea').innerHTML = renderDropZone(); setupDropZone(); }

async function saveForm() {
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { showToast('Preencha o nome do ponto.', 'error'); return; }
  const lat = parseFloat(document.getElementById('f-lat')?.value);
  const lng = parseFloat(document.getElementById('f-lng')?.value);
  if (!lat || !lng) { showToast('Defina a localização no mapa.', 'error'); return; }

  const isEdit = !!editingId, existing = isEdit ? getSpots().find(s => s.id===editingId) : null;
  const newId = isEdit ? editingId : crypto.randomUUID();
  let photoVal = (window._pendingPhoto !== undefined) ? window._pendingPhoto : (existing?.photo || null);

  const spot = {
    id: newId, name,
    cat:       document.getElementById('f-cat')?.value || 'cultura',
    emoji:     document.getElementById('f-emoji')?.value || '🏛️',
    color:     document.getElementById('f-color')?.value || '#1B6B6B',
    lat, lng,
    desc:      document.getElementById('f-desc')?.value?.trim() || '',
    address:   document.getElementById('f-address')?.value?.trim() || '',
    horario:   document.getElementById('f-horario')?.value?.trim() || '',
    entrada:   document.getElementById('f-entrada')?.value?.trim() || '',
    photo:     photoVal,
    blogTitle:   document.getElementById('f-btitle')?.value?.trim() || name,
    blogContent: document.getElementById('blogEditor')?.innerHTML || '',
    blogAuthor:  document.getElementById('f-bauthor')?.value?.trim() || 'Equipe Sobral Cultural',
    blogDate:    new Date().toISOString().split('T')[0],
    createdAt:   existing?.createdAt || new Date().toISOString()
  };

  const btn = document.querySelector('button[onclick="saveForm()"]');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Salvando…'; }
  const ok = await saveSpotToSupabase(spot);
  if (btn) { btn.disabled=false; btn.innerHTML='💾 Salvar Ponto'; }
  if (ok) { window._pendingPhoto=undefined; coordPickerMap=null; coordMarker=null; showToast(`✅ "${name}" salvo no Supabase!`, 'success'); setTimeout(()=>navigate('list'), 900); }
}

function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Formato inválido');
      document.getElementById('confirmTitle').textContent = 'Importar Backup no Supabase?';
      document.getElementById('confirmMsg').textContent = `Substituirá ${getSpots().length} pontos atuais por ${data.length} pontos do arquivo.`;
      document.getElementById('confirmOk').onclick = async () => {
        closeModal(); showToast('Importando…', 'info');
        await supa.from('spots').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        for (const s of data) {
          const row = { id: s.id||crypto.randomUUID(), name:s.name, cat:s.cat, emoji:s.emoji, color:s.color, lat:s.lat, lng:s.lng, description:s.desc, address:s.address, horario:s.horario, entrada:s.entrada, photo:s.photo, blog_title:s.blogTitle, blog_content:s.blogContent, blog_author:s.blogAuthor, blog_date:s.blogDate, created_at:s.createdAt||new Date().toISOString() };

let _submissions = [];

async function loadSubmissions() {

  const pending = _submissions.filter(s => s.status === 'pending').length;
  const badge = document.getElementById('modBadge');
  if (badge) { badge.textContent = pending; badge.style.display = pending > 0 ? 'inline-flex' : 'none'; }
}

          <div style="display:flex;gap:7px">
            <button class="btn btn-sm btn-primary" style="flex:1" onclick="moderateSubmission('${s.id}','approved')">✅ Aprovar</button>

          ${s.status==='approved' ? `<button class="btn btn-sm btn-danger" onclick="moderateSubmission('${s.id}','rejected')">↩️ Revogar</button>` : `<button class="btn btn-sm btn-primary" onclick="moderateSubmission('${s.id}','approved')">✅ Re-aprovar</button>`}
        </div>`}
      </div>
    </div>`;
  };

  return `

    <div class="page-title"><h2>🔍 Moderação de Conteúdo</h2><p>${pending.length} aguardando · ${approved.length} aprovado${approved.length!==1?'s':''} · ${rejected.length} rejeitado${rejected.length!==1?'s':''}</p></div>

    </div>` : ''}

    <div class="section-title" style="margin-bottom:6px">⏳ Aguardando Aprovação (${pending.length})</div>
    ${pending.length === 0

async function moderateSubmission(id, status, adminNote = '') {
  const sub = _submissions.find(s => s.id === id);
  if (!sub) return;

  // If approving a spot type: publish to spots table
  if (status === 'approved' && sub.type === 'spot') {
    const spotRow = {
      id: sub.id, name: sub.name, cat: sub.cat, emoji: sub.emoji || '📍',
      color: sub.color || '#C8871A', lat: sub.lat, lng: sub.lng,
      description: sub.description, address: sub.address,
      horario: sub.horario, entrada: sub.entrada, photo: sub.photo,
      blog_title: sub.name, blog_content: `<p>${sub.description||''}</p>`,
      blog_author: sub.profiles?.full_name || 'Sobral Cultural',
      blog_date: new Date().toISOString().split('T')[0],
      created_at: new Date().toISOString()
    };
    await supa.from('spots').upsert(spotRow, { onConflict: 'id' });
  }

  // If revoking an approved spot
  if (status === 'rejected' && sub.status === 'approved' && sub.type === 'spot') {
    await supa.from('spots').delete().eq('id', sub.id);
  }

  await supa.from('submissions').update({ status, admin_note: adminNote, updated_at: new Date().toISOString() }).eq('id', id);
  await loadSubmissions();
  await loadSpots();
  showToast(`Submissão ${status === 'approved' ? 'aprovada ✅' : 'rejeitada ❌'}`, status === 'approved' ? 'success' : 'info');
  navigate('moderation');
}

function promptReject(id) {
  const note = prompt('Motivo da rejeição (será exibido ao usuário):');
  if (note === null) return; // cancelled
  moderateSubmission(id, 'rejected', note || 'Não atende aos critérios da plataforma.');
}

function previewSubmission(id) {
  const s = _submissions.find(x => x.id === id);
  if (!s) return;
  document.getElementById('confirmTitle').textContent = `📍 ${s.name}`;
  document.getElementById('confirmMsg').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${s.type==='event'?'📅 Evento':'📍 Ponto'} · ${s.cat} · ${new Date(s.created_at).toLocaleDateString('pt-BR')}</div>
    ${s.photo ? `<img src="${s.photo}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:10px">` : ''}
    <div style="font-size:13px;line-height:1.6;color:var(--muted);background:rgba(0,0,0,.2);border-radius:8px;padding:12px">${s.description||'Sem descrição'}</div>
    <div style="font-size:12px;margin-top:10px;color:var(--muted)">📍 ${s.address||'—'} · 🕐 ${s.horario||'—'} · 🎫 ${s.entrada||'—'}</div>
    ${s.lat&&s.lng ? `<div style="font-size:11px;margin-top:6px;color:var(--muted)">Coords: ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}</div>` : ''}`;
  document.getElementById('confirmOk').textContent = '✅ Aprovar';
  document.getElementById('confirmOk').className = 'btn btn-primary';
  document.getElementById('confirmOk').onclick = () => { moderateSubmission(s.id,'approved'); closeModal(); };
  document.getElementById('confirmModal').classList.add('open');
}

// ══════════════════════════════════════════
//  MESSAGES
// ══════════════════════════════════════════
let _messages = [];

async function loadMessages() {
  const { data } = await supa.from('contacts').select('*').order('created_at', { ascending: false });
  _messages = data || [];
  const unread = _messages.filter(m => !m.read).length;
  const badge = document.getElementById('msgBadge');
  if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'inline-flex' : 'none'; }
}

function renderMessages() {
  const msgs = _messages;
  const unread = msgs.filter(m => !m.read).length;
  return `
  <div class="page-header">
    <div class="page-title"><h2>✉️ Mensagens de Contato</h2><p>${msgs.length} recebida${msgs.length!==1?'s':''} · <strong style="color:var(--ochre)">${unread} não lida${unread!==1?'s':''}</strong></p></div>
    <div class="page-actions"><button class="btn btn-secondary" onclick="markAllRead()">✓ Todas como lidas</button></div>
  </div>
  <div class="page-content">
    ${msgs.length === 0
      ? `<div class="empty-state"><div class="es-icon">✉️</div><h3>Nenhuma mensagem ainda</h3><p>Mensagens enviadas pela página de Contato aparecerão aqui.</p></div>`
      : `<div style="overflow-x:auto"><table class="msg-table">
          <thead><tr><th>Status</th><th>Nome</th><th>E-mail</th><th>Assunto</th><th>Data</th><th></th></tr></thead>
          <tbody>${msgs.map(m => {
            const dt = new Date(m.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});
            return `<tr class="msg-row ${!m.read?'unread':''}" onclick="openMessage('${m.id}')">
              <td><span class="msg-badge ${!m.read?'new':'read'}">${!m.read?'Nova':'Lida'}</span></td>
              <td style="font-weight:${!m.read?'600':'400'};white-space:nowrap">${m.name}</td>
              <td style="color:var(--muted)">${m.email}</td>
              <td style="color:var(--muted)">${m.subject||'—'}</td>
              <td style="color:var(--muted);white-space:nowrap">${dt}</td>
              <td onclick="event.stopPropagation()"><button class="btn btn-sm btn-danger" onclick="confirmDeleteMsg('${m.id}')">🗑️</button></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`
    }
  </div>`;
}

function openMessage(id) {
  const m = _messages.find(x => x.id === id);
  if (!m) return;
  const dt = new Date(m.created_at).toLocaleString('pt-BR');
  document.getElementById('confirmTitle').textContent = `✉️ ${m.name}`;
  document.getElementById('confirmMsg').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${dt}${m.subject?` · ${m.subject}`:''}</div>
    <div style="font-size:13px;margin-bottom:12px">
      <strong style="color:var(--ochre)">Email:</strong> <a href="mailto:${m.email}" style="color:var(--ochre)">${m.email}</a>
      ${m.phone?` &nbsp;·&nbsp; <strong style="color:var(--ochre)">Tel:</strong> ${m.phone}`:''}
    </div>
    <div style="background:rgba(0,0,0,.25);border-radius:9px;padding:14px;font-size:13.5px;line-height:1.7;color:var(--muted);white-space:pre-wrap">${m.message}</div>`;
  document.getElementById('confirmOk').textContent = '✉️ Responder por E-mail';
  document.getElementById('confirmOk').className = 'btn btn-primary';
  document.getElementById('confirmOk').onclick = () => { window.open(`mailto:${m.email}?subject=Re: ${encodeURIComponent(m.subject||'Sobral Cultural')}`); closeModal(); };
  document.getElementById('confirmModal').classList.add('open');
  if (!m.read) markRead(id);
}

async function markRead(id) {
  await supa.from('contacts').update({ read: true }).eq('id', id);
  await loadMessages();
  if (currentView === 'messages') document.getElementById('mainContent').innerHTML = renderMessages();
}

async function markAllRead() {
  await supa.from('contacts').update({ read: true }).eq('read', false);
  await loadMessages();
  document.getElementById('mainContent').innerHTML = renderMessages();
  showToast('Todas marcadas como lidas.', 'success');
}

function confirmDeleteMsg(id) {
  const m = _messages.find(x => x.id === id);
  document.getElementById('confirmTitle').textContent = `Excluir mensagem de "${m?.name}"?`;
  document.getElementById('confirmMsg').textContent = 'Esta ação não pode ser desfeita.';
  document.getElementById('confirmOk').textContent = 'Excluir';
  document.getElementById('confirmOk').className = 'btn btn-danger';
  document.getElementById('confirmOk').onclick = async () => {
    closeModal();
    await supa.from('contacts').delete().eq('id', id);
    await loadMessages();
    document.getElementById('mainContent').innerHTML = renderMessages();
    showToast('Mensagem excluída.', 'info');
  };
  document.getElementById('confirmModal').classList.add('open');
}

// ══════════════════════════════════════════
//  PAGES MANAGER
// ══════════════════════════════════════════
const PAGE_DEFS = [
  { id:'sobre', icon:'ℹ️', name:'Sobre o Projeto', desc:'Conteúdo da página Sobre', url:'sobral_sobre.html' },
];
let _pagesCache = {};

async function loadPages() {
  const { data } = await supa.from('pages').select('*');
  _pagesCache = {};
  (data || []).forEach(p => { _pagesCache[p.id] = p; });
}

function renderPagesManager() {
  const custom = Object.values(_pagesCache).filter(p => !PAGE_DEFS.find(d => d.id === p.id));
  return `
  <div class="page-header">
    <div class="page-title"><h2>📄 Gerenciar Páginas</h2><p>Crie, edite e exclua páginas do site</p></div>
    <div class="page-actions"><button class="btn btn-primary" onclick="navigate('editPage','nova')">➕ Nova Página</button></div>
  </div>
  <div class="page-content">
    <div class="section-title" style="margin-bottom:6px">Páginas do Site</div>
    <div class="section-sub">Conteúdo editável das páginas fixas</div>
    <div class="pages-list" style="margin-bottom:28px">
      ${PAGE_DEFS.map(p => {
        const pg = _pagesCache[p.id];
        const upd = pg?.updated_at ? new Date(pg.updated_at).toLocaleDateString('pt-BR') : 'Nunca editada';
        return `<div class="page-item" onclick="navigate('editPage','${p.id}')">
          <div class="page-item-icon">${p.icon}</div>
          <div class="page-item-info"><div class="page-item-name">${p.name}</div><div class="page-item-meta">${p.desc} · Última edição: ${upd}</div></div>
          <div class="page-item-actions">
            <a href="${p.url}" target="_blank" class="btn btn-sm btn-ghost" onclick="event.stopPropagation()">👁️</a>
            <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();navigate('editPage','${p.id}')">✏️ Editar</button>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-title" style="margin-bottom:6px">Páginas Personalizadas</div>
    <div class="section-sub">Páginas extras criadas por você</div>
    <div class="pages-list">
      ${custom.length === 0
        ? `<div class="empty-state" style="padding:28px"><div class="es-icon" style="font-size:32px;margin-bottom:10px">📄</div><p style="font-size:13px">Nenhuma página personalizada. Clique em "Nova Página" para criar.</p></div>`
        : custom.map(p => `<div class="page-item" onclick="navigate('editPage','${p.id}')">
          <div class="page-item-icon">📄</div>
          <div class="page-item-info"><div class="page-item-name">${p.title}</div><div class="page-item-meta">ID: ${p.id} · ${new Date(p.updated_at).toLocaleDateString('pt-BR')}</div></div>
          <div class="page-item-actions">
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();confirmDeletePage('${p.id}')">🗑️</button>
            <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();navigate('editPage','${p.id}')">✏️</button>
          </div>
        </div>`).join('')
      }
    </div>
  </div>`;
}

function renderPageEditor(pageId) {
  const isNew = pageId === 'nova';
  const predef = PAGE_DEFS.find(p => p.id === pageId);
  const existing = _pagesCache[pageId];
  const title = isNew ? 'Nova Página' : (predef?.name || existing?.title || 'Editar');
  const content = existing?.content || '';
  const pgTitle = existing?.title || predef?.name || '';
  return `
  <div class="page-header">
    <div class="page-title"><h2>${isNew ? '➕ Nova Página' : `✏️ ${title}`}</h2><p>${isNew ? 'Preencha e salve para criar' : 'Edite e salve as alterações'}</p></div>
    <div class="page-actions">
      <button class="btn btn-ghost" onclick="navigate('pages')">← Cancelar</button>
      <button class="btn btn-primary" onclick="savePage('${pageId}')">💾 Salvar</button>
    </div>
  </div>
  <div class="page-content">
    <div class="form-section" id="sec-pageinfo">
      <div class="form-section-header" onclick="toggleSection('pageinfo')"><span class="form-section-icon">📝</span><h3>Informações</h3><span class="form-section-toggle">▾</span></div>
      <div class="form-section-body">
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Título <em>*</em></label>
            <input id="pg-title" placeholder="Ex: Sobre o Projeto" value="${pgTitle}" ${predef&&!isNew?'readonly style="opacity:.6"':''}>
          </div>
          <div class="form-group">
            <label>ID / Slug ${isNew?'<em>*</em>':''}</label>
            <input id="pg-id" placeholder="ex: sobre" value="${isNew?'':pageId}" ${!isNew?'readonly style="opacity:.6"':''}>
            <div class="helper">Minúsculas, sem espaços.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-section" id="sec-pagecontent">
      <div class="form-section-header" onclick="toggleSection('pagecontent')"><span class="form-section-icon">📄</span><h3>Conteúdo da Página</h3><span class="form-section-toggle">▾</span></div>
      <div class="form-section-body">
        <div class="helper" style="margin-bottom:12px">Editor de texto rico. O conteúdo é salvo no Supabase e exibido automaticamente no site.</div>
        <div class="page-editor-wrap">
          <div class="editor-toolbar">
            <button onclick="fmtPg('bold')"><b>B</b></button>
            <button onclick="fmtPg('italic')"><i>I</i></button>
            <div class="sep"></div>
            <button onclick="fmtPg('formatBlock','h2')">H2</button>
            <button onclick="fmtPg('formatBlock','h3')">H3</button>
            <button onclick="fmtPg('formatBlock','p')">¶</button>
            <div class="sep"></div>
            <button onclick="fmtPg('insertUnorderedList')">•</button>
            <button onclick="fmtPg('insertOrderedList')">1.</button>
            <button onclick="fmtPg('formatBlock','blockquote')">❝</button>
            <div class="sep"></div>
            <button onclick="insertPgLink()">🔗</button>
            <button onclick="fmtPg('removeFormat')">✕</button>
          </div>
          <div id="pageEditor" class="blog-editor" contenteditable="true">${content||'<p>Escreva aqui o conteúdo da página…</p>'}</div>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" onclick="navigate('pages')">← Cancelar</button>
      <button class="btn btn-primary" onclick="savePage('${pageId}')">💾 Salvar</button>
    </div>
  </div>`;
}

function initPageEditor(pageId) { /* nothing extra needed */ }

function fmtPg(cmd, val=null) { document.execCommand(cmd, false, val); document.getElementById('pageEditor')?.focus(); }
function insertPgLink() { const u=prompt('URL:'); if(u) document.execCommand('createLink',false,u); }

async function savePage(pageId) {
  const isNew = pageId === 'nova';
  const pgTitle = document.getElementById('pg-title')?.value?.trim();
  const pgId = isNew
    ? (document.getElementById('pg-id')?.value?.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''))
    : pageId;
  const content = document.getElementById('pageEditor')?.innerHTML || '';
  if (!pgTitle) { showToast('Preencha o título.', 'error'); return; }
  if (!pgId) { showToast('Preencha o ID da página.', 'error'); return; }

  const { error } = await supa.from('pages').upsert(
    { id: pgId, title: pgTitle, content, updated_at: new Date().toISOString() },
    { onConflict: 'id' }
  );
  if (error) { showToast('Erro ao salvar: ' + error.message, 'error'); return; }
  await loadPages();
  showToast(`✅ "${pgTitle}" salva!`, 'success');
  setTimeout(() => navigate('pages'), 900);
}

async function confirmDeletePage(id) {
  const p = _pagesCache[id];
  document.getElementById('confirmTitle').textContent = `Excluir "${p?.title}"?`;
  document.getElementById('confirmMsg').textContent = 'Esta ação não pode ser desfeita.';
  document.getElementById('confirmOk').textContent = 'Excluir';
  document.getElementById('confirmOk').className = 'btn btn-danger';
  document.getElementById('confirmOk').onclick = async () => {
    closeModal();
    await supa.from('pages').delete().eq('id', id);
    await loadPages();
    navigate('pages');
    showToast('Página excluída.', 'info');
  };
  document.getElementById('confirmModal').classList.add('open');
}

// ══════════════════════════════════════════
//  HELPERS GERAIS
// ══════════════════════════════════════════
function fmt(cmd, val=null) { document.execCommand(cmd, false, val); document.getElementById('blogEditor')?.focus(); }
function insertLink() { const url = prompt('URL do link:'); if (url) document.execCommand('createLink', false, url); }
function pickEmoji(e) { document.getElementById('f-emoji').value = e; document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.remove('selected')); event.target.classList.add('selected'); }
function pickColor(c) { document.getElementById('f-color').value = c; document.querySelectorAll('.color-opt').forEach(el=>el.classList.remove('selected')); event.target.classList.add('selected'); }
function toggleSection(name) { document.getElementById('sec-'+name)?.classList.toggle('collapsed'); }
function updateCharCount() { const v = document.getElementById('f-desc')?.value||''; const el = document.getElementById('descCount'); if (el) el.textContent = `${v.length}/350`; }
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer'), icons = { success:'✅', error:'❌', info:'ℹ️' };
  const t = document.createElement('div'); t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]||'•'}</span> <span>${msg}</span>`;
  c.appendChild(t); setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(60px)'; setTimeout(()=>t.remove(),300); }, 3500);
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
window.onload = async () => {
  // Check Supabase session
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    const { data: prof } = await supa.from('profiles').select('role').eq('id', session.user.id).single();
    if (prof?.role === 'admin') {
      window._adminUser = session.user;
      showLoginOverlay(false);
      showToast('Conectando ao Supabase…', 'info');
      await Promise.all([loadSpots(), loadMessages(), loadPages(), loadSubmissions()]);
      startRealtime();
      navigate('dashboard');
      return;
    }
  }
  // Not logged in / not admin
  showLoginOverlay(true);
};
window.addEventListener('beforeunload', () => { if (coordPickerMap) { coordPickerMap.remove(); coordPickerMap=null; } });
</script>
