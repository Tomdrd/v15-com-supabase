<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="head.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobral Cultural — Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="sobral_admin.css">
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-modal">
    <h2>Área Administrativa</h2>
    <p>Faça login com sua conta de administrador</p>
    <div class="form-group">
      <label style="font-size:12px;margin-bottom:4px;display:block">E-mail</label>
      <input id="adminUser" type="email" placeholder="admin@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label style="font-size:12px;margin-bottom:4px;display:block">Senha</label>
      <input id="adminPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')performLogin()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="performLogin()">
      <i data-lucide="log-in" class="icon-sm"></i> Entrar
    </button>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">Acesso restrito a administradores autorizados.</div>
  </div>
</div>

<div class="app" id="theApp">
  <!-- MOBILE TOPBAR -->
  <div class="adm-topbar" id="admTopbar">
    <button class="adm-hbg" id="admHbg" onclick="toggleAdmSb()"><span></span><span></span><span></span></button>
    <h2 class="tb-logo-name"></h2>
    <button class="btn btn-sm btn-primary" onclick="navigate('new')">
      <i data-lucide="plus" class="icon-sm"></i> Novo
    </button>
  </div>
  <div class="mob-sb-back" id="mobSbBack" onclick="closeAdmSb()" style="display:none"></div>

  <aside class="sidebar" id="admSidebar">
    <div class="sb-logo">
      <div class="sb-logo-top">
        <img src="logo.png" alt="Sobral Cultural" class="sb-logo-img">
        <div>
          <h1 class="tb-logo-name"></h1>
          <div style="font-size:10px;color:var(--muted)">Painel Administrativo</div>
        </div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nav-section">Navegação</div>
      <button class="nav-btn active" onclick="navigate('dashboard')">
        <div class="icon"><i data-lucide="layout-dashboard"></i></div> Painel Geral
      </button>
      <button class="nav-btn" onclick="navigate('list')">
        <div class="icon"><i data-lucide="map-pin"></i></div> Pontos Turísticos
        <span class="badge" id="spotCountBadge">…</span>
      </button>
      <button class="nav-btn" onclick="navigate('new')">
        <div class="icon"><i data-lucide="plus-circle"></i></div> Adicionar Novo Ponto
      </button>
      <div class="nav-section">Comunicação</div>
      <button class="nav-btn" onclick="navigate('messages')">
        <div class="icon"><i data-lucide="mail"></i></div> Mensagens
        <span class="badge" id="msgBadge" style="display:none">0</span>
      </button>
      <button class="nav-btn" onclick="navigate('moderation')">
        <div class="icon"><i data-lucide="shield-check"></i></div> Moderação
        <span class="badge" id="modBadge" style="display:none">0</span>
      </button>
      <div class="nav-section">Páginas do Site</div>
      <button class="nav-btn" onclick="navigate('pages')">
        <div class="icon"><i data-lucide="file-text"></i></div> Gerenciar Páginas
      </button>
      <div class="nav-section">Sistema</div>
      <button class="nav-btn" onclick="navigate('backup')">
        <div class="icon"><i data-lucide="database"></i></div> Backup e Restauração
      </button>
    </nav>
    <div class="sb-footer">
      <a href="index.html" target="_blank">
        <i data-lucide="map" class="icon-sm"></i> Abrir Mapa ao Vivo
      </a>
      <button class="btn btn-danger" style="width:100%;margin-top:8px;justify-content:center" onclick="logout()">
        <i data-lucide="log-out" class="icon-sm"></i> Sair
      </button>
    </div>
  </aside>

  <main class="main" id="mainContent"></main>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Confirmar ação</h3>
    <p id="confirmMsg">Tem certeza?</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="confirmOk">Confirmar</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="sobral_admin.js"></script>
</body>
</html>
