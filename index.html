<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Mapeamento cultural e turístico de Sobral, Ceará.">

  <!-- Preconnect para domínios externos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://nrohpfggqcbscyoigpiz.supabase.co" crossorigin>

  <!-- Preload do Lucide em versão fixa para cache de longo prazo -->
  <link rel="preload" as="script" href="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" crossorigin>

<!-- Leaflet CSS preload -->
  <link rel="preload" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <noscript><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"></noscript>

  <!-- CSS local -->
  <link rel="stylesheet" href="index.css">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sobralcultural.vercel.app/">
  <meta property="og:title" content="Sobral Cultural">
  <meta property="og:description" content="Mapeamento cultural e turístico de Sobral, Ceará.">
  <meta property="og:image" content="https://sobralcultural.vercel.app/tumb.webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://sobralcultural.vercel.app/">
  <meta name="twitter:title" content="Sobral Cultural">
  <meta name="twitter:description" content="Mapeamento cultural e turístico de Sobral, Ceará.">
  <meta name="twitter:image" content="https://sobralcultural.vercel.app/tumb.webp">

  <!-- Scripts externos com defer -->
  <script src="cache.js"></script>
  <script>
    try {
      const cachedFeatured = localStorage.getItem('sc_featured_news');
      const cachedSpots = localStorage.getItem('sc_spots');
      let firstImage = null;
      if (cachedFeatured) {
        const data = JSON.parse(cachedFeatured).data;
        if (data && data.length > 0) firstImage = data[0].photo;
      }
      if (!firstImage && cachedSpots) {
        const spots = JSON.parse(cachedSpots).data;
        const featured = spots.filter(s => s.isFeatured);
        if (featured.length > 0) firstImage = featured[0].photo;
      }
      if (firstImage) {
        if (firstImage.startsWith('http') && !firstImage.includes('supabase.co') && !firstImage.includes('postimg.cc')) {
          firstImage = 'https://wsrv.nl/?url=' + encodeURIComponent(firstImage) + '&w=800&output=webp';
        }
        const link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.href = firstImage;
        link.fetchPriority = 'high';
        document.head.appendChild(link);
      }
    } catch(e) {}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <!-- Scripts locais -->
  <script src="splash.js"></script>
  <script src="head.js" defer></script>

  <!-- Google Fonts — não bloqueante -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap"></noscript>

  <!-- CSS local -->

  <link rel="stylesheet" href="icons.css">
</head>

                </button>
                <button class="btn-xd" onclick="closeDetail()" aria-label="Fechar painel">
