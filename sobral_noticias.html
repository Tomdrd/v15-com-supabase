<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="head.js"></script>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias — Sobral Cultural</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="sobral_noticias.css">
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tb-logo">
    <img src="logo.png" alt="Sobral Cultural" class="tb-logo-img">
    <div class="tb-logo-text">
      <span class="tb-logo-name"></span>
    </div>
  </a>
  <nav class="tb-nav">
    <a href="index.html"><i data-lucide="map"></i> Mapa</a>
    <a href="sobral_sobre.html"><i data-lucide="info"></i> Sobre</a>
    <a href="sobral_contato.html"><i data-lucide="mail"></i> Contato</a>
    <a href="sobral_noticias.html" class="active"><i data-lucide="newspaper"></i> Notícias</a>
    <a href="sobral_game.html"><i data-lucide="gamepad-2"></i> Quiz</a>
  </nav>
  <button class="hbg" id="hbg" onclick="toggleDrw()"><span></span><span></span><span></span></button>
</div>

<div class="dov" id="dov" onclick="closeDrw()"></div>
<div class="drw" id="drw">
  <div class="drw-inner">
    <div class="drw-sec">Navegação</div>
    <a href="index.html" class="drw-lnk"><div class="drw-ic"><i data-lucide="map"></i></div> Mapa Turístico</a>
    <a href="sobral_noticias.html" class="drw-lnk active"><div class="drw-ic"><i data-lucide="newspaper"></i></div> Notícias</a>
    <a href="sobral_sobre.html" class="drw-lnk"><div class="drw-ic"><i data-lucide="info"></i></div> Sobre o Projeto</a>
    <a href="sobral_contato.html" class="drw-lnk"><div class="drw-ic"><i data-lucide="mail"></i></div> Contato</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-icon"><i data-lucide="newspaper" style="width:52px;height:52px;stroke-width:1"></i></div>
    <h1>Notícias</h1>
    <p>Cultura, eventos e acontecimentos de Sobral e região</p>
    <div class="hero-filters" id="heroFilters">
      <button class="hpill active" data-cat="todos">Todos</button>
      <button class="hpill" data-cat="evento">Eventos</button>
      <button class="hpill" data-cat="cultura">Cultura</button>
      <button class="hpill" data-cat="musica">Música</button>
      <button class="hpill" data-cat="gastronomia">Gastronomia</button>
      <button class="hpill" data-cat="turismo">Turismo</button>
    </div>
  </div>
</div>

<!-- BARRA DE BUSCA -->
<div class="search-bar">
  <div class="search-inner">
    <i data-lucide="search" class="search-ico"></i>
    <input type="text" id="searchInput" placeholder="Buscar notícias…" oninput="filterNews()">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">
      <i data-lucide="x"></i>
    </button>
  </div>
  <div class="search-meta" id="searchMeta"></div>
</div>

<!-- GRID DE NOTÍCIAS -->
<div class="page-wrap">
  <div class="news-grid" id="newsGrid">
    <!-- Skeletons enquanto carrega -->
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
    <div class="skel-card"><div class="skel-ico"></div><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none">
    <i data-lucide="search-x" style="width:40px;height:40px;stroke-width:1;opacity:.3"></i>
    <p>Nenhuma notícia encontrada</p>
    <span>Tente outro termo ou categoria</span>
  </div>

  <!-- DETALHE DA NOTÍCIA -->
  <div class="news-detail" id="newsDetail" style="display:none">
    <div class="detail-back">
      <button onclick="closeDetail()"><i data-lucide="arrow-left"></i> Voltar às notícias</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- RODAPÉ LIMPO -->
  <div class="page-footer">
    <div class="footer-note">Resumos gerados por IA · Atualizado a cada 3 horas</div>
  </div>
</div>

<script src="sobral_noticias.js"></script>
<script src="footer.js"></script>
</body>
</html>
