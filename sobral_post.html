<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobral Cultural — Post</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ochre:#C8871A;--gold:#D4A843;--terra:#B54A2A;--deep:#1A1410;--mid:#251B12;--panel:#2E2118;--cream:#F5EDD8;--muted:rgba(245,237,216,.55);--sand:#E8D4B0;--teal:#1B6B6B;--H:56px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--cream);min-height:100vh}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--H);padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,20,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,135,26,.2);gap:12px}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:15px;flex-shrink:0}
.tb-logo span{font-family:'Playfair Display',serif;font-size:16px;color:var(--cream)}
.tb-logo em{color:var(--ochre);font-style:normal}
.tb-acts{display:flex;gap:8px;align-items:center}
.tb-nav{display:flex;gap:4px}.tb-nav a{padding:6px 12px;border-radius:7px;font-size:12.5px;color:rgba(245,237,216,.65);text-decoration:none;transition:.15s}.tb-nav a:hover{background:rgba(200,135,26,.1);color:var(--cream)}
.btn-back{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(200,135,26,.2);color:var(--cream);padding:7px 14px;border-radius:8px;font-size:12.5px;text-decoration:none;transition:.15s}
.btn-back:hover{background:rgba(255,255,255,.12)}
.btn-share{background:var(--ochre);color:var(--deep);border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}
.btn-share:hover{background:var(--gold)}
/* hamburger */
.hbg{display:none;flex-direction:column;gap:5px;width:38px;height:38px;background:rgba(255,255,255,.07);border:1px solid rgba(200,135,26,.2);border-radius:8px;cursor:pointer;padding:8px;justify-content:center;flex-shrink:0}
.hbg span{display:block;height:2px;background:var(--cream);border-radius:2px;transition:all .3s}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0}
.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.dov{position:fixed;inset:0;top:var(--H);background:rgba(0,0,0,.5);z-index:1800;opacity:0;pointer-events:none;transition:opacity .3s}.dov.open{opacity:1;pointer-events:all}
.drw{position:fixed;top:var(--H);right:0;bottom:0;width:260px;background:var(--mid);border-left:1px solid rgba(200,135,26,.2);z-index:1900;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.drw.open{transform:translateX(0)}
.drw-inner{padding:14px 12px}
.drw-sec{font-size:10px;color:rgba(245,237,216,.35);letter-spacing:1.5px;text-transform:uppercase;padding:12px 10px 5px}
.drw-lnk{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;color:var(--cream);text-decoration:none;font-size:13.5px;transition:.15s;border:none;background:transparent;cursor:pointer;width:100%;text-align:left}
.drw-lnk:hover{background:rgba(200,135,26,.12);color:var(--ochre)}
.drw-ic{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

/* PROGRESS */
.pgb{position:fixed;top:var(--H);left:0;right:0;height:2px;z-index:999}.pgf{height:100%;background:var(--ochre);width:0%;transition:width .1s linear}

/* HERO */
.hero{position:relative;height:65vh;min-height:360px;max-height:520px;overflow:hidden;margin-top:var(--H)}
.hero img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.6)}
.hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:100px;background:linear-gradient(135deg,var(--mid),var(--panel));opacity:.7}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,20,16,1) 0%,rgba(26,20,16,.2) 55%,transparent 100%)}
.hero-cnt{position:absolute;bottom:0;left:0;right:0;padding:28px 36px 36px;max-width:860px}
.hero-bc{display:flex;align-items:center;gap:6px;font-size:11.5px;color:rgba(245,237,216,.45);margin-bottom:12px}.hero-bc a{color:var(--ochre);text-decoration:none}.hero-bc a:hover{text-decoration:underline}
.hero-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:20px;font-size:11.5px;font-weight:600;letter-spacing:.5px;margin-bottom:12px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,48px);font-weight:800;line-height:1.1;color:var(--cream);margin-bottom:12px;text-shadow:0 2px 16px rgba(0,0,0,.5)}
.hero-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:rgba(245,237,216,.55)}.hero-meta span{display:flex;align-items:center;gap:4px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 320px;gap:32px;max-width:1060px;margin:0 auto;padding:44px 24px 80px}

/* ARTICLE */
.article{min-width:0}
.article-body{font-family:'Lora',serif;font-size:17px;line-height:1.85;color:var(--sand)}
.article-body h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold);margin:32px 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(200,135,26,.2)}
.article-body h3{font-family:'Playfair Display',serif;font-size:21px;color:var(--ochre);margin:26px 0 9px;font-weight:600}
.article-body p{margin-bottom:18px}.article-body ul,.article-body ol{margin:0 0 18px 26px}.article-body li{margin-bottom:7px}
.article-body blockquote{border-left:3px solid var(--ochre);padding:14px 22px;background:rgba(200,135,26,.07);border-radius:0 10px 10px 0;margin:22px 0;font-style:italic;color:var(--muted)}
.article-body a{color:var(--ochre)}.article-body strong{color:var(--cream);font-weight:600}
.art-footer{margin-top:36px;padding-top:24px;border-top:1px solid rgba(200,135,26,.2);display:flex;align-items:center;gap:14px}
.av{width:46px;height:46px;border-radius:50%;background:var(--ochre);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.av-name{font-weight:600;font-size:14px}.av-date{font-size:12px;color:var(--muted);margin-top:2px}

/* SIDEBAR */
.sbc{display:flex;flex-direction:column;gap:16px}
.ic{background:var(--mid);border:1px solid rgba(200,135,26,.2);border-radius:14px;overflow:hidden;position:sticky;top:calc(var(--H) + 16px)}
.ic-hd{padding:14px 16px;border-bottom:1px solid rgba(200,135,26,.15);display:flex;align-items:center;gap:8px}.ic-hd h3{font-size:13.5px;font-weight:600;color:var(--ochre)}
.ic-body{padding:16px}
.ir{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;font-size:13px}.ir:last-child{margin-bottom:0}.ir-ico{font-size:15px;flex-shrink:0;margin-top:1px}.ir-lbl{font-size:10.5px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}.ir-val{color:var(--cream);line-height:1.4}
.mc{background:var(--mid);border:1px solid rgba(200,135,26,.2);border-radius:14px;overflow:hidden}.mc-hd{padding:12px 16px;border-bottom:1px solid rgba(200,135,26,.15)}.mc-hd h3{font-size:13px;font-weight:600;color:var(--ochre)}
#miniMap{height:190px}
.rc{background:var(--mid);border:1px solid rgba(200,135,26,.2);border-radius:14px;padding:16px}.rc h3{font-size:13px;font-weight:600;color:var(--ochre);margin-bottom:12px}
.ri{display:flex;gap:9px;align-items:center;padding:9px;border-radius:8px;transition:.15s;text-decoration:none;color:var(--cream)}.ri:hover{background:rgba(200,135,26,.1)}
.ri-em{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ri-name{font-size:13px;font-weight:500;line-height:1.3}.ri-cat{font-size:11px;color:var(--muted)}

/* FLOAT */
.floatback{position:fixed;bottom:24px;right:20px;z-index:200;background:var(--ochre);color:var(--deep);border:none;width:48px;height:48px;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(200,135,26,.5);transition:.2s;display:flex;align-items:center;justify-content:center}
.floatback:hover{transform:scale(1.1)}

/* LOADING */
.loading-st{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}
.lsp{width:40px;height:40px;border:3px solid rgba(200,135,26,.2);border-top:3px solid var(--ochre);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOT FOUND */
.nf{text-align:center;padding:100px 24px}.nf h2{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:10px}.nf p{color:var(--muted);margin-bottom:22px}
.btn-nf{display:inline-flex;align-items:center;gap:6px;background:var(--ochre);color:var(--deep);padding:10px 20px;border-radius:9px;text-decoration:none;font-weight:600;font-size:14px;transition:.15s}
.btn-nf:hover{background:var(--gold)}

/* RESPONSIVE */
@media(max-width:900px){.layout{grid-template-columns:1fr;padding:32px 16px 64px}.ic{position:static}}
@media(max-width:600px){
  .hero{height:55vh;min-height:300px}.hero-cnt{padding:20px 18px 28px}
  .hero-title{font-size:clamp(20px,6vw,36px)}
  .tb-nav{display:none}.hbg{display:flex}
  .article-body{font-size:16px}
}
@media(min-width:601px){.hbg{display:none!important}.tb-nav{display:flex}}
</style>
</head>
<body>

<div class="pgb"><div class="pgf" id="pgf"></div></div>

<div class="topbar">
  <a href="index.html" class="tb-logo"><span>🏛️ Sobral <em>Cultural</em></span></a>
  <nav class="tb-nav">
    <a href="index.html">🗺️ Mapa</a>
    <a href="sobral_sobre.html">ℹ️ Sobre</a>
    <a href="sobral_contato.html">✉️ Contato</a>
  </nav>
  <div class="tb-acts">
    <a href="index.html" class="btn-back">← Mapa</a>
    <button class="btn-share" onclick="sharePost()">↗ Compartilhar</button>
    <button class="hbg" id="hbg" onclick="toggleDrw()"><span></span><span></span><span></span></button>
  </div>
</div>

<div class="dov" id="dov" onclick="closeDrw()"></div>
<div class="drw" id="drw">
  <div class="drw-inner">

    <a href="index.html" class="drw-lnk"><div class="drw-ic">🗺️</div> Mapa Turístico</a>
    <a href="sobral_sobre.html" class="drw-lnk"><div class="drw-ic">ℹ️</div> Sobre o Projeto</a>
    <a href="sobral_contato.html" class="drw-lnk"><div class="drw-ic">✉️</div> Contato</a>
    <a href="sobral_admin.html" class="drw-lnk"><div class="drw-ic">⚙️</div> Painel Admin</a>
  </div>
</div>

<div id="root">
  <div class="loading-st"><div class="lsp"></div><div style="font-size:13px;color:rgba(245,237,216,.4)">Carregando…</div></div>
</div>

<button class="floatback" onclick="window.history.back()" title="Voltar">←</button>

<script>
const SU='https://nrohpfggqcbscyoigpiz.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yb2hwZmdncWNic2N5b2lncGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzAxMTcsImV4cCI6MjA5MTUwNjExN30.OMNV3gRIEOMY15Ay_7K6M0z938TIinMpgErOTXHSFrA';
const supa=supabase.createClient(SU,SK);
const CL={todos:'Todos',religioso:'⛪ Religioso',cultura:'🎭 Cultura',historico:'🏛️ Histórico',natureza:'🌿 Natureza',lazer:'🎡 Lazer'};
const CC={religioso:'#6440B4',cultura:'#1B6B6B',historico:'#B54A2A',natureza:'#3C7828',lazer:'#C8871A'};

window.addEventListener('scroll',()=>{const d=document.documentElement;document.getElementById('pgf').style.width=(d.scrollTop/(d.scrollHeight-d.clientHeight)*100)+'%';});
function toggleDrw(){['hbg','drw','dov'].forEach(id=>document.getElementById(id).classList.toggle('open'));}
function closeDrw(){['hbg','drw','dov'].forEach(id=>document.getElementById(id).classList.remove('open'));}

async function renderPage(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){renderNF();return;}
  const{data:rows}=await supa.from('spots').select('*').eq('id',id).limit(1);
  if(!rows||!rows.length){renderNF();return;}
  const r=rows[0];
  const s={id:r.id,name:r.name,cat:r.cat,emoji:r.emoji,color:r.color,lat:r.lat,lng:r.lng,desc:r.description,address:r.address,horario:r.horario,entrada:r.entrada,photo:r.photo,blogTitle:r.blog_title,blogContent:r.blog_content,blogAuthor:r.blog_author,blogDate:r.blog_date};
  const{data:rel}=await supa.from('spots').select('id,name,cat,emoji,color').eq('cat',s.cat).neq('id',id).limit(3);
  document.title=`${s.name} — Sobral Cultural`;
  const cc=s.color||CC[s.cat]||'#C8871A',cl=CL[s.cat]||s.cat;
  const ds=s.blogDate?new Date(s.blogDate+'T12:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'}):'';
  document.getElementById('root').innerHTML=`
    <div class="hero">
      ${s.photo?`<img src="${s.photo}" alt="${s.name}">`:`<div class="hero-ph">${s.emoji}</div>`}
      <div class="hero-ov"></div>
      <div class="hero-cnt">
        <div class="hero-bc"><a href="index.html">Mapa</a><span>›</span><span>${cl}</span><span>›</span><span>${s.name}</span></div>
        <div class="hero-cat" style="background:${cc}33;color:${cc};border:1px solid ${cc}66">${cl}</div>
        <h1 class="hero-title">${s.blogTitle||s.name}</h1>
        <div class="hero-meta">
          <span>✍️ ${s.blogAuthor||'Equipe Sobral Cultural'}</span>
          ${ds?`<span>📅 ${ds}</span>`:''}
          <span>📍 ${s.address||'Sobral, CE'}</span>
        </div>
      </div>
    </div>
    <div class="layout">
      <article class="article">
        <div class="article-body">${s.blogContent||`<p>${s.desc||''}</p>`}</div>
        <div class="art-footer">
          <div class="av">${s.emoji}</div>
          <div><div class="av-name">${s.blogAuthor||'Equipe Sobral Cultural'}</div><div class="av-date">${ds||'Publicado recentemente'} · Sobral, Ceará</div></div>
        </div>

        <!-- REACTIONS -->
        <div style="margin-top:28px;padding:20px;background:var(--panel);border:1px solid var(--border);border-radius:14px">
          <div style="font-size:13.5px;font-weight:600;color:var(--cream);margin-bottom:12px">O que você achou deste lugar?</div>
          <div id="rxnArea" style="display:flex;flex-direction:column;gap:12px">
            <div style="font-size:13px;color:var(--muted)">Carregando…</div>
          </div>
        </div>
      </article>
      <div class="sbc">
        <div class="ic">
          <div class="ic-hd"><span style="font-size:18px">${s.emoji}</span><h3>Informações Práticas</h3></div>
          <div class="ic-body">
            ${s.address?`<div class="ir"><div class="ir-ico">📍</div><div><div class="ir-lbl">Endereço</div><div class="ir-val">${s.address}</div></div></div>`:''}
            ${s.horario?`<div class="ir"><div class="ir-ico">🕐</div><div><div class="ir-lbl">Horário</div><div class="ir-val">${s.horario}</div></div></div>`:''}
            ${s.entrada?`<div class="ir"><div class="ir-ico">🎫</div><div><div class="ir-lbl">Entrada</div><div class="ir-val">${s.entrada}</div></div></div>`:''}
            <div class="ir"><div class="ir-ico">🗂️</div><div><div class="ir-lbl">Categoria</div><div class="ir-val">${cl}</div></div></div>
          </div>
        </div>
        ${s.lat&&s.lng?`<div class="mc"><div class="mc-hd"><h3>📍 Localização</h3></div><div id="miniMap"></div></div>`:''}
        ${rel&&rel.length?`<div class="rc"><h3>Veja Também</h3>${rel.map(x=>`<a href="sobral_post.html?id=${x.id}" class="ri"><div class="ri-em" style="background:${x.color||'#1B6B6B'}22">${x.emoji}</div><div><div class="ri-name">${x.name}</div><div class="ri-cat">${CL[x.cat]||x.cat}</div></div></a>`).join('')}</div>`:'' }
      </div>
    </div>`;
  if(s.lat&&s.lng){setTimeout(()=>{const mm=L.map('miniMap',{center:[s.lat,s.lng],zoom:15,zoomControl:false,dragging:false,scrollWheelZoom:false});L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',subdomains:'abcd',maxZoom:19}).addTo(mm);const ico=L.divIcon({html:`<div style="width:34px;height:34px;background:${cc};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);box-shadow:0 4px 12px rgba(0,0,0,.4)"><span style="transform:rotate(45deg);font-size:15px">${s.emoji}</span></div>`,className:'',iconSize:[34,34],iconAnchor:[17,34]});L.marker([s.lat,s.lng],{icon:ico}).addTo(mm);},200);}
  // load reactions
  initReactions(s.id);
}
function renderNF(){document.getElementById('root').innerHTML=`<div class="nf"><div style="font-size:60px;margin-bottom:16px">🗺️</div><h2>Ponto não encontrado</h2><p>Este ponto turístico não existe ou foi removido.</p><a href="index.html" class="btn-nf">← Voltar ao Mapa</a></div>`;}
function sharePost(){if(navigator.share)navigator.share({title:document.title,url:location.href}).catch(()=>copyLink());else copyLink();}
function copyLink(){navigator.clipboard?.writeText(location.href).then(()=>alert('Link copiado! ✓'));}

// ── AUTH + REACTIONS ──────────────────────
let CUR_USER = null, CUR_REACTIONS = [], CURRENT_SPOT_ID = null;

async function initReactions(spotId) {
  CURRENT_SPOT_ID = spotId;
  const { data: { session } } = await supa.auth.getSession();
  CUR_USER = session?.user || null;
  if (CUR_USER) {
    const { data } = await supa.from('reactions').select('*').eq('user_id', CUR_USER.id).eq('spot_id', String(spotId));
    CUR_REACTIONS = data || [];
  }
  await renderReactions(spotId);
}

async function renderReactions(spotId) {
  const el = document.getElementById('rxnArea');
  if (!el) return;
  const { data: counts } = await supa.from('reactions').select('reaction').eq('spot_id', String(spotId));
  const likeCount  = (counts||[]).filter(r=>r.reaction==='like').length;
  const beenCount  = (counts||[]).filter(r=>r.reaction==='been').length;
  const goingCount = (counts||[]).filter(r=>r.reaction==='going').length;

  const myLike  = CUR_USER && CUR_REACTIONS.find(r=>r.reaction==='like');
  const myBeen  = CUR_USER && CUR_REACTIONS.find(r=>r.reaction==='been');
  const myGoing = CUR_USER && CUR_REACTIONS.find(r=>r.reaction==='going');

  const btnStyle = (active, color) => `display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;border:1.5px solid;transition:all .15s;font-family:'DM Sans',sans-serif;${active ? `background:${color}22;border-color:${color}88;color:${color}` : 'background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:var(--cream)'}`;

  if (!CUR_USER) {
    el.innerHTML = `<div style="text-align:center;padding:8px 0">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Entre para curtir e marcar que você foi ou quer visitar!</div>
      <a href="sobral_login.html?redirect=${encodeURIComponent(location.href)}" style="display:inline-flex;align-items:center;gap:6px;background:var(--ochre);color:var(--deep);padding:10px 20px;border-radius:9px;text-decoration:none;font-size:13.5px;font-weight:600">👤 Entrar ou Criar Conta</a>
    </div>`;
    return;
  }

  el.innerHTML = `<div style="display:flex;gap:10px;flex-wrap:wrap">
    <button style="${btnStyle(myLike,'#e05050')}" onclick="toggleR('like')">❤️ Gostei${likeCount>0?` <span style="opacity:.6;font-size:11px">${likeCount}</span>`:''}</button>
    <button style="${btnStyle(myBeen,'#4a9a3a')}" onclick="toggleR('been')">✅ Eu Fui${beenCount>0?` <span style="opacity:.6;font-size:11px">${beenCount}</span>`:''}</button>
    <button style="${btnStyle(myGoing,'#C8871A')}" onclick="toggleR('going')">📅 Eu Vou${goingCount>0?` <span style="opacity:.6;font-size:11px">${goingCount}</span>`:''}</button>
  </div>
  <div style="font-size:11.5px;color:var(--muted)">
    ${likeCount} curtiu · ${beenCount} já foi · ${goingCount} quer ir
  </div>`;
}

async function toggleR(reaction) {
  if (!CUR_USER || !CURRENT_SPOT_ID) return;
  const existing = CUR_REACTIONS.find(r=>r.reaction===reaction);
  if (existing) {
    await supa.from('reactions').delete().eq('id', existing.id);
    CUR_REACTIONS = CUR_REACTIONS.filter(r=>r.id!==existing.id);
  } else {
    const { data } = await supa.from('reactions').insert({ user_id:CUR_USER.id, spot_id:String(CURRENT_SPOT_ID), reaction, spot_type:'spot' }).select().single();
    if (data) CUR_REACTIONS.push(data);
  }
  renderReactions(CURRENT_SPOT_ID);
}

window.onload = renderPage;
</script>
</body>
</html>
