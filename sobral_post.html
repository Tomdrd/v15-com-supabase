<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobral Cultural — Post</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ochre:#C8871A;--gold:#D4A843;--terra:#B54A2A;--deep:#1A1410;--mid:#251B12;--panel:#2E2118;--cream:#F5EDD8;--muted:rgba(245,237,216,0.55);--sand:#E8D4B0;--teal:#1B6B6B;--green:#3C7828;--purple:#6440B4;--border:rgba(200,135,26,0.2)}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--cream);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,20,16,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-logo{display:flex;align-items:center;gap:10px;font-weight:500;font-size:14px}.topbar-logo span{font-family:'Playfair Display',serif;font-size:16px}.topbar-logo em{color:var(--ochre);font-style:normal}
.topbar-actions{display:flex;gap:10px}
.btn-back{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--cream);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:.15s;text-decoration:none}.btn-back:hover{background:rgba(255,255,255,.12)}
.btn-share{background:var(--ochre);color:var(--deep);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}.btn-share:hover{background:var(--gold)}
.hero{position:relative;height:70vh;min-height:400px;max-height:560px;overflow:hidden;margin-top:56px}
.hero-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.65)}
.hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;background:linear-gradient(135deg,var(--mid) 0%,var(--panel) 100%);opacity:.7}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,20,16,1) 0%,rgba(26,20,16,.3) 50%,transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:36px 48px 40px;max-width:900px}
.hero-breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(245,237,216,.5);margin-bottom:14px;letter-spacing:.5px}.hero-breadcrumb a{color:var(--ochre);text-decoration:none}.hero-breadcrumb a:hover{text-decoration:underline}
.hero-cat{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:14px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,52px);font-weight:800;line-height:1.1;color:var(--cream);margin-bottom:14px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.hero-meta{display:flex;flex-wrap:wrap;gap:18px;font-size:13px;color:rgba(245,237,216,.6)}.hero-meta span{display:flex;align-items:center;gap:5px}
.layout{display:grid;grid-template-columns:1fr 340px;gap:36px;max-width:1100px;margin:0 auto;padding:48px 24px 80px}
.article{min-width:0}
.article-body{font-family:'Lora',serif;font-size:17px;line-height:1.85;color:var(--sand)}.article-body h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold);margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}.article-body h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--ochre);margin:28px 0 10px;font-weight:600}.article-body p{margin-bottom:20px}.article-body ul,.article-body ol{margin:0 0 20px 28px}.article-body li{margin-bottom:8px}.article-body blockquote{border-left:3px solid var(--ochre);padding:16px 24px;background:rgba(200,135,26,.08);border-radius:0 10px 10px 0;margin:24px 0;font-style:italic;color:var(--muted)}.article-body a{color:var(--ochre)}.article-body strong{color:var(--cream);font-weight:600}
.article-footer{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px}
.author-avatar{width:48px;height:48px;border-radius:50%;background:var(--ochre);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.author-info .name{font-weight:600;font-size:14.5px}.author-info .date{font-size:12.5px;color:var(--muted);margin-top:2px}
.sidebar-col{display:flex;flex-direction:column;gap:18px}
.info-card{background:var(--mid);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:sticky;top:72px}
.info-card-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}.info-card-header h3{font-size:14px;font-weight:600;color:var(--ochre)}
.info-card-body{padding:18px}
.info-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;font-size:13px}.info-row:last-child{margin-bottom:0}.info-icon{font-size:16px;flex-shrink:0;margin-top:1px}.info-label{font-size:11px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}.info-value{color:var(--cream);line-height:1.4}
.map-card{background:var(--mid);border:1px solid var(--border);border-radius:14px;overflow:hidden}.map-card-header{padding:14px 18px;border-bottom:1px solid var(--border)}.map-card-header h3{font-size:13px;font-weight:600;color:var(--ochre)}
#miniMap{height:200px}
.related-card{background:var(--mid);border:1px solid var(--border);border-radius:14px;padding:18px}.related-card h3{font-size:13px;font-weight:600;color:var(--ochre);margin-bottom:14px}
.related-item{display:flex;gap:10px;align-items:center;padding:10px;border-radius:8px;cursor:pointer;transition:.15s;text-decoration:none;color:var(--cream)}.related-item:hover{background:rgba(200,135,26,.1)}
.related-emoji{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.related-name{font-size:13px;font-weight:500;line-height:1.3}.related-cat{font-size:11px;color:var(--muted)}
.progress-bar{position:fixed;top:56px;left:0;right:0;height:2px;background:transparent;z-index:99}.progress-fill{height:100%;background:var(--ochre);width:0%;transition:width .1s linear}
.float-back{position:fixed;bottom:28px;right:28px;z-index:200;background:var(--ochre);color:var(--deep);border:none;width:52px;height:52px;border-radius:50%;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(200,135,26,.5);transition:.2s;display:flex;align-items:center;justify-content:center}.float-back:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(200,135,26,.6)}
.not-found{text-align:center;padding:120px 20px}.not-found h2{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:12px}.not-found p{color:var(--muted);margin-bottom:24px}
.loading-state{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}.loading-spinner{width:40px;height:40px;border:3px solid rgba(200,135,26,.2);border-top:3px solid var(--ochre);border-radius:50%;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.layout{grid-template-columns:1fr;gap:24px;padding:32px 16px 60px}.hero-content{padding:24px 20px 28px}.info-card{position:static}}
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="topbar">
  <div class="topbar-logo"><span>🏛️ Sobral <em>Cultural</em></span></div>
  <div class="topbar-actions">
    <a href="sobral_turismo.html" class="btn-back">← Voltar ao Mapa</a>
    <button class="btn-share" onclick="sharePost()">↗ Compartilhar</button>
  </div>
</div>

<div id="root">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div style="font-size:13px;color:rgba(245,237,216,.4)">Carregando conteúdo…</div>
  </div>
</div>

<button class="float-back" onclick="window.history.back()" title="Voltar">←</button>

<script>
// ══════════════════════════════════════════
//  SUPABASE
// ══════════════════════════════════════════
const SUPA_URL = 'https://nrohpfggqcbscyoigpiz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yb2hwZmdncWNic2N5b2lncGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzAxMTcsImV4cCI6MjA5MTUwNjExN30.OMNV3gRIEOMY15Ay_7K6M0z938TIinMpgErOTXHSFrA';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const CAT_LABELS = { todos:'Todos', religioso:'⛪ Religioso', cultura:'🎭 Cultura', historico:'🏛️ Histórico', natureza:'🌿 Natureza', lazer:'🎡 Lazer' };
const CAT_COLORS = { religioso:'#6440B4', cultura:'#1B6B6B', historico:'#B54A2A', natureza:'#3C7828', lazer:'#C8871A' };

function getId() {
  return new URLSearchParams(window.location.search).get('id');
}

async function renderPage() {
  const id = getId();
  if (!id) { renderNotFound(); return; }

  // Busca o spot específico
  const { data: rows, error } = await supa.from('spots').select('*').eq('id', id).limit(1);
  if (error || !rows || rows.length === 0) { renderNotFound(); return; }

  const r = rows[0];
  const spot = {
    id: r.id, name: r.name, cat: r.cat, emoji: r.emoji, color: r.color,
    lat: r.lat, lng: r.lng, desc: r.description, address: r.address,
    horario: r.horario, entrada: r.entrada, photo: r.photo,
    blogTitle: r.blog_title, blogContent: r.blog_content,
    blogAuthor: r.blog_author, blogDate: r.blog_date
  };

  // Busca pontos relacionados (mesma categoria)
  const { data: relRows } = await supa.from('spots').select('id,name,cat,emoji,color').eq('cat', spot.cat).neq('id', id).limit(3);
  const related = (relRows || []);

  document.title = `${spot.name} — Sobral Cultural`;

  const catColor = spot.color || CAT_COLORS[spot.cat] || '#C8871A';
  const catLabel = CAT_LABELS[spot.cat] || spot.cat;
  const dateStr  = spot.blogDate ? new Date(spot.blogDate + 'T12:00:00').toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' }) : '';

  document.getElementById('root').innerHTML = `
    <div class="hero">
      ${spot.photo
        ? `<img src="${spot.photo}" alt="${spot.name}" class="hero-img">`
        : `<div class="hero-placeholder">${spot.emoji}</div>`}
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-breadcrumb">
          <a href="sobral_turismo.html">Mapa Turístico</a>
          <span>›</span><span>${catLabel}</span>
          <span>›</span><span>${spot.name}</span>
        </div>
        <div class="hero-cat" style="background:${catColor}33;color:${catColor};border:1px solid ${catColor}66">${catLabel}</div>
        <h1 class="hero-title">${spot.blogTitle || spot.name}</h1>
        <div class="hero-meta">
          <span>✍️ ${spot.blogAuthor || 'Equipe Sobral Cultural'}</span>
          ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
          <span>📍 ${spot.address || 'Sobral, CE'}</span>
        </div>
      </div>
    </div>

    <div class="layout">
      <!-- ARTICLE -->
      <article class="article">
        <div class="article-body">
          ${spot.blogContent || `<p>${spot.desc || ''}</p>`}
        </div>
        <div class="article-footer">
          <div class="author-avatar">${spot.emoji}</div>
          <div class="author-info">
            <div class="name">${spot.blogAuthor || 'Equipe Sobral Cultural'}</div>
            <div class="date">${dateStr || 'Publicado recentemente'} · Sobral, Ceará</div>
          </div>
        </div>
      </article>

      <!-- SIDEBAR -->
      <div class="sidebar-col">
        <div class="info-card">
          <div class="info-card-header"><span style="font-size:18px">${spot.emoji}</span><h3>Informações Práticas</h3></div>
          <div class="info-card-body">
            ${spot.address ? `<div class="info-row"><div class="info-icon">📍</div><div><div class="info-label">Endereço</div><div class="info-value">${spot.address}</div></div></div>` : ''}
            ${spot.horario ? `<div class="info-row"><div class="info-icon">🕐</div><div><div class="info-label">Horário</div><div class="info-value">${spot.horario}</div></div></div>` : ''}
            ${spot.entrada ? `<div class="info-row"><div class="info-icon">🎫</div><div><div class="info-label">Entrada</div><div class="info-value">${spot.entrada}</div></div></div>` : ''}
            <div class="info-row"><div class="info-icon">🗂️</div><div><div class="info-label">Categoria</div><div class="info-value">${catLabel}</div></div></div>
          </div>
        </div>

        ${spot.lat && spot.lng ? `
        <div class="map-card">
          <div class="map-card-header"><h3>📍 Localização</h3></div>
          <div id="miniMap"></div>
        </div>` : ''}

        ${related.length > 0 ? `
        <div class="related-card">
          <h3>Veja Também</h3>
          ${related.map(rel => `
            <a href="sobral_post.html?id=${rel.id}" class="related-item">
              <div class="related-emoji" style="background:${rel.color||'#1B6B6B'}22">${rel.emoji}</div>
              <div><div class="related-name">${rel.name}</div><div class="related-cat">${CAT_LABELS[rel.cat]||rel.cat}</div></div>
            </a>`).join('')}
        </div>` : ''}
      </div>
    </div>
  `;

  // Mini mapa
  if (spot.lat && spot.lng) {
    setTimeout(() => {
      const mapEl = document.getElementById('miniMap');
      if (!mapEl) return;
      const miniMap = L.map('miniMap', { center:[spot.lat,spot.lng], zoom:15, zoomControl:false, dragging:false, scrollWheelZoom:false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'© OSM © CARTO', subdomains:'abcd', maxZoom:19 }).addTo(miniMap);
      const icon = L.divIcon({
        html: `<div style="width:36px;height:36px;background:${catColor};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);box-shadow:0 4px 12px rgba(0,0,0,.4)"><span style="transform:rotate(45deg);font-size:16px">${spot.emoji}</span></div>`,
        className:'', iconSize:[36,36], iconAnchor:[18,36]
      });
      L.marker([spot.lat,spot.lng], { icon }).addTo(miniMap);
    }, 200);
  }
}

function renderNotFound() {
  document.getElementById('root').innerHTML = `
    <div class="not-found">
      <div style="font-size:64px;margin-bottom:20px">🗺️</div>
      <h2>Ponto não encontrado</h2>
      <p>Este ponto turístico não existe ou foi removido do sistema.</p>
      <a href="sobral_turismo.html" class="btn-back" style="display:inline-flex;margin:0 auto">← Voltar ao Mapa</a>
    </div>`;
}

// Scroll progress bar
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
});

function sharePost() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: window.location.href }).catch(() => copyLink());
  } else { copyLink(); }
}
function copyLink() {
  navigator.clipboard?.writeText(window.location.href).then(() => alert('Link copiado! ✓'));
}

window.onload = renderPage;
</script>
</body>
</html>
