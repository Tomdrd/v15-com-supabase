<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="cache.js"></script>
  <script src="head.js"></script>
  <script src="navigate.js"></script>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Sobral Cultural</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="404.css">

  <!-- Google Fonts — não bloqueante -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap"></noscript>

  <!-- CSS local -->
  <link rel="stylesheet" href="topbar.css">
  <link rel="stylesheet" href="icons.css">
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tb-logo">
    <img src="logo.png" alt="Sobral Cultural" width="142" height="40" class="tb-logo-img">
    <div class="tb-logo-text">
      <span class="tb-logo-name">Sobral <em>Cultural</em></span>
    </div>
  </a>
  <nav class="tb-nav">
    <!-- Injetado pelo head.js -->
  </nav>
  <button class="hbg" aria-label="Abrir menu de navegação" id="hbg" onclick="toggleDrw()"><span></span><span></span><span></span></button>
</div>

<div class="dov" id="dov" onclick="closeDrw()"></div>
<div class="drw" id="drw">
  <div class="drw-inner">
    <!-- Injetado pelo head.js -->
  </div>
</div>

<div class="error-container">
  <div class="error-content">

    <h1 class="error-code">404</h1>
    <h2 class="error-title">Página não encontrada</h2>
    <p class="error-message">Opa! Parece que o link que você seguiu está quebrado ou a página foi removida.</p>

<div class="error-icon" style="display: inline-block;">
  <img src="v-404.gif" alt="Erro 404" 
       style="margin-bottom: 20px;">
</div>

    <div class="error-actions">
      <button class="btn btn-secondary" onclick="goBack()">
        <i data-lucide="arrow-left"></i> Voltar
      </button>
      <a href="index.html" class="btn btn-primary">
        <i data-lucide="map"></i> Ir para o Mapa
      </a>
    </div>
  </div>
</div>

<script src="404.js"></script>
<script src="footer.js"></script>
</body>
</html>
