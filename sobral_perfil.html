<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil — Sobral Cultural</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ochre:#C8871A;--gold:#D4A843;--terra:#B54A2A;--deep:#1A1410;--mid:#251B12;--panel:#2E2118;--cream:#F5EDD8;--muted:rgba(245,237,216,.55);--teal:#1B6B6B;--green:#3C7828;--border:rgba(200,135,26,.2);--H:56px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--cream);min-height:100vh}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--H);padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,20,16,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);gap:12px}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}.tb-logo span{font-family:'Playfair Display',serif;font-size:16px;color:var(--cream)}.tb-logo em{color:var(--ochre);font-style:normal}
.tb-nav{display:flex;gap:6px;align-items:center}
.nl{padding:6px 12px;border-radius:7px;font-size:12.5px;color:rgba(245,237,216,.65);text-decoration:none;transition:.15s}.nl:hover{background:rgba(200,135,26,.1);color:var(--cream)}
.btn-logout{background:rgba(181,74,42,.15);color:#e89e7e;border:1px solid rgba(181,74,42,.3);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}.btn-logout:hover{background:rgba(181,74,42,.25)}

/* HERO / PROFILE */
.profile-hero{background:linear-gradient(135deg,var(--mid) 0%,#1a2e2e 100%);padding:calc(var(--H) + 32px) 24px 0;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(200,135,26,.1),transparent 60%)}
.profile-inner{max-width:900px;margin:0 auto;display:flex;gap:24px;align-items:flex-end;padding-bottom:0;position:relative;z-index:1}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:90px;height:90px;border-radius:50%;border:3px solid var(--ochre);object-fit:cover;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-placeholder{width:90px;height:90px;border-radius:50%;border:3px solid var(--ochre);background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:36px}
.role-badge{position:absolute;bottom:2px;right:2px;background:var(--ochre);color:var(--deep);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.role-badge.admin{background:#6440B4;color:white}
.profile-info{flex:1;min-width:0;padding-bottom:16px}
.profile-name{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,32px);font-weight:800;color:var(--cream);margin-bottom:4px}
.profile-email{font-size:13px;color:var(--muted);margin-bottom:10px}
.profile-stats{display:flex;gap:20px;flex-wrap:wrap}
.pstat{text-align:center}.pstat-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--ochre)}.pstat-lbl{font-size:11px;color:var(--muted)}

/* TABS */
.profile-tabs{background:var(--mid);border-bottom:1px solid var(--border);position:sticky;top:var(--H);z-index:900}
.profile-tabs-inner{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.profile-tabs-inner::-webkit-scrollbar{display:none}
.ptab{padding:14px 20px;font-size:13.5px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.ptab:hover{color:var(--cream)}.ptab.active{color:var(--ochre);border-bottom-color:var(--ochre)}

/* CONTENT */
.profile-content{max-width:900px;margin:0 auto;padding:28px 20px 80px}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.sub-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
.sub-card:hover{border-color:rgba(200,135,26,.4);transform:translateY(-2px)}
.sub-photo{height:120px;overflow:hidden;background:var(--mid);position:relative}
.sub-photo img{width:100%;height:100%;object-fit:cover;filter:brightness(.8)}
.sub-photo-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.4}
.sub-badge{position:absolute;top:8px;left:8px;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.5px}
.sub-badge.pending{background:rgba(200,135,26,.8);color:var(--deep)}
.sub-badge.approved{background:rgba(60,120,40,.8);color:#fff}
.sub-badge.rejected{background:rgba(181,74,42,.8);color:#fff}
.sub-body{padding:12px 14px}
.sub-name{font-weight:600;font-size:14px;color:var(--cream);margin-bottom:4px}
.sub-meta{font-size:11.5px;color:var(--muted);line-height:1.4;margin-bottom:10px}
.sub-actions{display:flex;gap:7px}

/* REACTION CARD */
.reaction-card{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:.2s;text-decoration:none;color:var(--cream)}
.reaction-card:hover{border-color:rgba(200,135,26,.4);transform:translateX(3px)}
.rc-emoji{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rc-info{flex:1;min-width:0}.rc-name{font-weight:500;font-size:13.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rc-meta{font-size:11.5px;color:var(--muted)}
.rc-type{font-size:12px;padding:3px 9px;border-radius:10px;background:rgba(200,135,26,.15);color:var(--ochre);flex-shrink:0;white-space:nowrap}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:16px;font-weight:600;color:var(--cream);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.6;max-width:300px;margin:0 auto 18px}

/* EDIT FORM */
.edit-form{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:540px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:12px;font-weight:500;color:var(--muted)}
input,textarea{background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:.15s;width:100%}
input:focus,textarea:focus{border-color:var(--ochre);background:rgba(200,135,26,.06)}
input::placeholder,textarea::placeholder{color:rgba(245,237,216,.25)}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.15s}
.btn-primary{background:var(--ochre);color:var(--deep)}.btn-primary:hover{background:var(--gold)}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--cream);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(181,74,42,.15);color:#e89e7e;border:1px solid rgba(181,74,42,.3)}.btn-danger:hover{background:rgba(181,74,42,.25)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}

/* LOADER */
.page-loader{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px}
.lsp{width:40px;height:40px;border:3px solid rgba(200,135,26,.2);border-top:3px solid var(--ochre);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;top:68px;right:16px;background:var(--mid);border:1px solid var(--border);color:var(--cream);padding:11px 16px;border-radius:9px;font-size:13px;z-index:9999;transform:translateX(120%);transition:transform .3s cubic-bezier(.34,1.2,.64,1);max-width:280px}
.toast.show{transform:translateX(0)}.toast.err{border-color:rgba(181,74,42,.6)}.toast.ok{border-color:rgba(60,120,40,.5);background:rgba(60,120,40,.12)}

/* RESPONSIVE */
.hbg{display:none;flex-direction:column;gap:5px;width:38px;height:38px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:8px;justify-content:center}
.hbg span{display:block;height:2px;background:var(--cream);border-radius:2px;transition:all .3s}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}.hbg.open span:nth-child(2){opacity:0}.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.dov{position:fixed;inset:0;top:var(--H);background:rgba(0,0,0,.5);z-index:1800;opacity:0;pointer-events:none;transition:opacity .3s}.dov.open{opacity:1;pointer-events:all}
.drw{position:fixed;top:var(--H);right:0;bottom:0;width:240px;background:var(--mid);border-left:1px solid var(--border);z-index:1900;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:14px 12px}.drw.open{transform:translateX(0)}
.drw a,.drw button{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;color:var(--cream);text-decoration:none;font-size:13.5px;transition:.15s;border:none;background:transparent;cursor:pointer;width:100%;text-align:left}.drw a:hover,.drw button:hover{background:rgba(200,135,26,.12);color:var(--ochre)}
@media(max-width:600px){.tb-nav{display:none}.hbg{display:flex}.profile-inner{flex-direction:column;align-items:flex-start;gap:16px}.profile-stats{gap:14px}.cards-grid{grid-template-columns:1fr}}
@media(min-width:601px){.hbg{display:none!important}.tb-nav{display:flex}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tb-logo"><span>🏛️ Sobral <em>Cultural</em></span></a>
  <nav class="tb-nav">
    <a href="index.html" class="nl">🗺️ Mapa</a>
    <a href="sobral_sobre.html" class="nl">ℹ️ Sobre</a>
    <a href="sobral_contato.html" class="nl">✉️ Contato</a>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </nav>
  <button class="hbg" id="hbg" onclick="toggleDrw()"><span></span><span></span><span></span></button>
</div>
<div class="dov" id="dov" onclick="closeDrw()"></div>
<div class="drw" id="drw">
  <a href="index.html"><span>🗺️</span> Mapa</a>
  <a href="sobral_sobre.html"><span>ℹ️</span> Sobre</a>
  <a href="sobral_contato.html"><span>✉️</span> Contato</a>
  <button onclick="doLogout();closeDrw()"><span>🚪</span> Sair da Conta</button>
</div>

<div id="root"><div class="page-loader"><div class="lsp"></div><div style="font-size:13px;color:var(--muted)">Carregando perfil…</div></div></div>
<div class="toast" id="toast"></div>

<script>
const SU='https://nrohpfggqcbscyoigpiz.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yb2hwZmdncWNic2N5b2lncGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzAxMTcsImV4cCI6MjA5MTUwNjExN30.OMNV3gRIEOMY15Ay_7K6M0z938TIinMpgErOTXHSFrA';
const supa=supabase.createClient(SU,SK);
const CAT_LABELS={todos:'Todos',religioso:'⛪ Religioso',cultura:'🎭 Cultura',historico:'🏛️ Histórico',natureza:'🌿 Natureza',lazer:'🎡 Lazer'};
const REACTION_LABELS={like:'❤️ Gostei',been:'✅ Eu Fui',going:'📅 Eu Vou'};

let USER=null, PROFILE=null, SUBS=[], REACTIONS=[], currentTab='submissions';

function toggleDrw(){['hbg','drw','dov'].forEach(id=>document.getElementById(id).classList.toggle('open'));}
function closeDrw(){['hbg','drw','dov'].forEach(id=>document.getElementById(id).classList.remove('open'));}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type==='ok'?'ok':type==='err'?'err':'');setTimeout(()=>t.className='toast',3800);}

async function init(){
  const{data:{session}}=await supa.auth.getSession();
  if(!session){location.href='sobral_login.html?redirect=sobral_perfil.html';return;}
  USER=session.user;

  // load profile
  const[{data:prof},{data:subs},{data:reacts}]=await Promise.all([
    supa.from('profiles').select('*').eq('id',USER.id).single(),
    supa.from('submissions').select('*').eq('user_id',USER.id).order('created_at',{ascending:false}),
    supa.from('reactions').select('*').eq('user_id',USER.id).order('created_at',{ascending:false})
  ]);
  PROFILE=prof||{role:'user',full_name:USER.user_metadata?.full_name||''};
  SUBS=subs||[];
  REACTIONS=reacts||[];
  renderPage();
}

function renderPage(){
  const avatarSrc=PROFILE.avatar_url||USER.user_metadata?.avatar_url||USER.user_metadata?.picture||'';
  const name=PROFILE.full_name||USER.user_metadata?.full_name||USER.email?.split('@')[0]||'Usuário';
  const isAdmin=PROFILE.role==='admin';
  const likeCount=REACTIONS.filter(r=>r.reaction==='like').length;
  const beenCount=REACTIONS.filter(r=>r.reaction==='been').length;
  const goingCount=REACTIONS.filter(r=>r.reaction==='going').length;

  document.getElementById('root').innerHTML=`
    <div class="profile-hero">
      <div class="profile-inner">
        <div class="avatar-wrap">
          ${avatarSrc
            ? `<div class="avatar"><img src="${avatarSrc}" alt="${name}"></div>`
            : `<div class="avatar-placeholder">${name.charAt(0).toUpperCase()}</div>`}
          <div class="role-badge ${isAdmin?'admin':''}">${isAdmin?'Admin':'Usuário'}</div>
        </div>
        <div class="profile-info">
          <div class="profile-name">${name}</div>
          <div class="profile-email">${USER.email}</div>
          <div class="profile-stats">
            <div class="pstat"><div class="pstat-num">${SUBS.length}</div><div class="pstat-lbl">Submissões</div></div>
            <div class="pstat"><div class="pstat-num">${likeCount}</div><div class="pstat-lbl">❤️ Gostei</div></div>
            <div class="pstat"><div class="pstat-num">${beenCount}</div><div class="pstat-lbl">✅ Fui</div></div>
            <div class="pstat"><div class="pstat-num">${goingCount}</div><div class="pstat-lbl">📅 Vou</div></div>
          </div>
        </div>
        <div style="padding-bottom:16px;flex-shrink:0">
          <button class="btn btn-secondary btn-sm" onclick="showTab('settings')" style="font-size:12px">⚙️ Editar Perfil</button>
        </div>
      </div>
    </div>

    <div class="profile-tabs">
      <div class="profile-tabs-inner">
        <button class="ptab ${currentTab==='submissions'?'active':''}" onclick="showTab('submissions')">📍 Minhas Submissões</button>
        <button class="ptab ${currentTab==='likes'?'active':''}" onclick="showTab('likes')">❤️ Gostei</button>
        <button class="ptab ${currentTab==='been'?'active':''}" onclick="showTab('been')">✅ Eu Fui</button>
        <button class="ptab ${currentTab==='going'?'active':''}" onclick="showTab('going')">📅 Eu Vou</button>
        <button class="ptab ${currentTab==='settings'?'active':''}" onclick="showTab('settings')">⚙️ Configurações</button>
      </div>
    </div>

    <div class="profile-content" id="tabContent"></div>`;

  renderTab(currentTab);
}

function showTab(tab){currentTab=tab;document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='submissions'?'Submissões':tab==='likes'?'Gostei':tab==='been'?'Fui':tab==='going'?'Vou':'Configurações')));renderTab(tab);}

function renderTab(tab){
  const c=document.getElementById('tabContent');
  if(tab==='submissions') c.innerHTML=renderSubmissions();
  else if(tab==='likes') c.innerHTML=renderReactions('like');
  else if(tab==='been') c.innerHTML=renderReactions('been');
  else if(tab==='going') c.innerHTML=renderReactions('going');
  else if(tab==='settings') c.innerHTML=renderSettings();
}

function renderSubmissions(){
  if(!SUBS.length) return `<div class="empty"><div class="empty-icon">📍</div><h3>Nenhuma submissão ainda</h3><p>Envie um ponto turístico ou evento para que ele apareça no mapa!</p><a href="sobral_submeter.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--ochre);color:var(--deep);padding:10px 20px;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600">➕ Submeter Ponto ou Evento</a></div>`;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="font-size:14px;color:var(--muted)">${SUBS.length} submissão${SUBS.length!==1?'s':''}</div><a href="sobral_submeter.html" class="btn btn-primary btn-sm">➕ Nova Submissão</a></div>
  <div class="cards-grid">${SUBS.map(s=>`
    <div class="sub-card">
      <div class="sub-photo">
        ${s.photo?`<img src="${s.photo}" alt="${s.name}">`:`<div class="sub-photo-ph">${s.emoji||'📍'}</div>`}
        <div class="sub-badge ${s.status}">${s.status==='pending'?'⏳ Aguardando':s.status==='approved'?'✅ Aprovado':'❌ Rejeitado'}</div>
      </div>
      <div class="sub-body">
        <div class="sub-name">${s.emoji||''} ${s.name}</div>
        <div class="sub-meta">${CAT_LABELS[s.cat]||s.cat} · ${s.type==='event'?'Evento':'Ponto Turístico'}<br>${new Date(s.created_at).toLocaleDateString('pt-BR')}
        ${s.status==='rejected'&&s.admin_note?`<br><span style="color:#e89e7e;font-size:11px">Motivo: ${s.admin_note}</span>`:''}
        ${s.status==='approved'?`<br><a href="sobral_post.html?id=${s.id}" style="color:var(--ochre);font-size:11px" target="_blank">Ver publicado →</a>`:''}
        </div>
        <div class="sub-actions">
          ${s.status!=='approved'?`<a href="sobral_submeter.html?edit=${s.id}" class="btn btn-sm btn-secondary">✏️</a>`:''}
          <button class="btn btn-sm btn-danger" onclick="deleteSub('${s.id}')">🗑️</button>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function renderReactions(type){
  const items=REACTIONS.filter(r=>r.reaction===type);
  const label=REACTION_LABELS[type];
  if(!items.length) return `<div class="empty"><div class="empty-icon">${type==='like'?'❤️':type==='been'?'✅':'📅'}</div><h3>Nenhum local aqui ainda</h3><p>Explore o mapa e marque lugares que você ${type==='like'?'gostou':type==='been'?'visitou':'quer visitar'}!</p><a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--ochre);color:var(--deep);padding:10px 20px;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600">🗺️ Explorar o Mapa</a></div>`;
  return `<div style="font-size:14px;color:var(--muted);margin-bottom:18px">${items.length} lugar${items.length!==1?'es':''} marcado${items.length!==1?'s':''} como "${label}"</div>
  <div style="display:flex;flex-direction:column;gap:10px">${items.map(r=>`
    <a href="sobral_post.html?id=${r.spot_id}" class="reaction-card">
      <div class="rc-emoji" style="background:rgba(200,135,26,.1)">${type==='like'?'❤️':type==='been'?'✅':'📅'}</div>
      <div class="rc-info"><div class="rc-name">📍 ${r.spot_id.substring(0,8)}…</div><div class="rc-meta">${new Date(r.created_at).toLocaleDateString('pt-BR')}</div></div>
      <div class="rc-type">${label}</div>
    </a>`).join('')}</div>`;
}

function renderSettings(){
  const name=PROFILE.full_name||USER.user_metadata?.full_name||'';
  const bio=PROFILE.bio||'';
  return `<div class="edit-form">
    <h3 style="font-family:'Playfair Display',serif;font-size:18px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)">⚙️ Editar Perfil</h3>
    <div class="fg"><label>Nome Completo</label><input id="sName" value="${name}" placeholder="Seu nome"></div>
    <div class="fg"><label>Bio / Descrição</label><textarea id="sBio" rows="3" placeholder="Conte um pouco sobre você…">${bio}</textarea></div>
    <div class="fg"><label>E-mail (não editável)</label><input value="${USER.email}" disabled style="opacity:.5"></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-primary" onclick="saveProfile()">💾 Salvar Alterações</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">
    <h3 style="font-family:'Playfair Display',serif;font-size:16px;margin-bottom:14px">🔐 Alterar Senha</h3>
    <div class="fg"><label>Nova Senha</label><input id="newPass" type="password" placeholder="Mínimo 8 caracteres"></div>
    <div class="fg"><label>Confirmar Nova Senha</label><input id="newPass2" type="password" placeholder="Repita a senha"></div>
    <button class="btn btn-secondary" onclick="changePassword()">🔑 Alterar Senha</button>
    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">
    <h3 style="font-family:'Playfair Display',serif;font-size:15px;color:#e89e7e;margin-bottom:12px">⚠️ Zona de Perigo</h3>
    <button class="btn btn-danger" onclick="confirmDeleteAccount()">🗑️ Excluir minha conta</button>
  </div>`;
}

async function saveProfile(){
  const name=document.getElementById('sName').value.trim();
  const bio=document.getElementById('sBio').value.trim();
  const{error}=await supa.from('profiles').upsert({id:USER.id,full_name:name,bio,updated_at:new Date().toISOString()},{onConflict:'id'});
  if(error){toast('Erro: '+error.message,'err');return;}
  PROFILE={...PROFILE,full_name:name,bio};
  toast('Perfil atualizado! ✓','ok');
  renderPage();
}

async function changePassword(){
  const p1=document.getElementById('newPass').value;
  const p2=document.getElementById('newPass2').value;
  if(p1.length<8){toast('Senha muito curta (mín. 8 caracteres).','err');return;}
  if(p1!==p2){toast('As senhas não coincidem.','err');return;}
  const{error}=await supa.auth.updateUser({password:p1});
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Senha alterada com sucesso! ✓','ok');
}

async function deleteSub(id){
  if(!confirm('Excluir esta submissão? Ação irreversível.'))return;
  await supa.from('submissions').delete().eq('id',id);
  SUBS=SUBS.filter(s=>s.id!==id);
  toast('Submissão excluída.','');
  renderTab('submissions');
}

async function confirmDeleteAccount(){
  if(!confirm('Tem certeza? Todos os seus dados serão removidos permanentemente.'))return;
  if(!confirm('Esta ação é IRREVERSÍVEL. Confirmar?'))return;
  await supa.auth.admin?.deleteUser?.(USER.id);
  await doLogout();
}

async function doLogout(){
  await supa.auth.signOut();
  location.href='/';
}

window.onload=init;
</script>
</body>
</html>
